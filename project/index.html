<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no" />
  <title>📚 ระบบคลังข้อสอบออนไลน์</title>

  <!-- ── CDN ── -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Kanit:wght@600;700&display=swap"
    rel="stylesheet" />

  <style>
    /* ══════════════════════════════════════════════
   GLOBAL STYLES
══════════════════════════════════════════════ */
    :root {
      --c-bg: #0a0a14;
      --c-surface: rgba(255, 255, 255, .05);
      --c-border: rgba(255, 255, 255, .10);
      --c-purple: #7c3aed;
      --c-cyan: #22d3ee;
      --c-text: #f1f5f9;
      --c-muted: rgba(241, 245, 249, .5);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent
    }

    html {
      scroll-behavior: smooth;
      -webkit-text-size-adjust: 100%
    }

    body {
      font-family: 'Sarabun', sans-serif;
      background: var(--c-bg);
      color: var(--c-text);
      min-height: 100svh;
      overflow-x: hidden;
      background-image:
        radial-gradient(ellipse at 20% 0%, rgba(124, 58, 237, .15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 100%, rgba(34, 211, 238, .08) 0%, transparent 50%);
    }

    .font-kanit {
      font-family: 'Kanit', sans-serif
    }

    /* Glass */
    .glass {
      background: rgba(255, 255, 255, .04);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px)
    }

    /* Gradient button */
    .btn-grad {
      background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 50%, #0ea5e9 100%);
      color: #fff;
      border: none;
      cursor: pointer;
      transition: all .2s;
      position: relative;
      overflow: hidden;
    }

    .btn-grad:hover {
      filter: brightness(1.12);
      transform: translateY(-1px)
    }

    .btn-grad:active {
      transform: scale(.98)
    }

    .btn-grad::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, .15), transparent);
      pointer-events: none
    }

    .btn-grad:disabled {
      opacity: .4;
      cursor: not-allowed;
      transform: none
    }

    /* Tab */
    .tab-btn {
      background: rgba(255, 255, 255, .06);
      color: rgba(255, 255, 255, .55);
      border: 1px solid rgba(255, 255, 255, .10);
      cursor: pointer;
      transition: all .2s
    }

    .tab-btn.active {
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 4px 14px rgba(124, 58, 237, .35)
    }

    /* Choice */
    .choice-btn {
      cursor: pointer;
      transition: all .2s
    }

    .choice-btn.sel {
      border-color: #7c3aed !important;
      background: rgba(124, 58, 237, .25) !important
    }

    .choice-btn.ok {
      border-color: #22c55e !important;
      background: rgba(34, 197, 94, .15) !important;
      color: #86efac !important
    }

    .choice-btn.no {
      border-color: #ef4444 !important;
      background: rgba(239, 68, 68, .15) !important;
      color: #fca5a5 !important
    }

    /* Quiz card */
    .quiz-card {
      transition: all .25s
    }

    .quiz-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 36px rgba(124, 58, 237, .2)
    }

    /* Scrollbar */
    .no-scroll::-webkit-scrollbar {
      display: none
    }

    .no-scroll {
      -ms-overflow-style: none;
      scrollbar-width: none
    }

    ::-webkit-scrollbar {
      width: 4px
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(124, 58, 237, .4);
      border-radius: 4px
    }

    /* Animations */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(12px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes bounceIn {
      0% {
        opacity: 0;
        transform: scale(.5)
      }

      60% {
        transform: scale(1.1)
      }

      100% {
        opacity: 1;
        transform: scale(1)
      }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    @keyframes shimmer {
      0% {
        background-position: -200% 0
      }

      100% {
        background-position: 200% 0
      }
    }

    .anim-fade {
      animation: fadeIn .4s ease both
    }

    .anim-bounce {
      animation: bounceIn .5s ease both
    }

    .anim-slide {
      animation: slideUp .35s ease both
    }

    .anim-spin {
      animation: spin 1s linear infinite
    }

    /* Skeleton */
    .skeleton {
      background: linear-gradient(90deg, rgba(255, 255, 255, .05) 25%, rgba(255, 255, 255, .12) 50%, rgba(255, 255, 255, .05) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 12px;
    }

    /* Drag & Drop */
    .drag-item {
      cursor: grab;
      transition: transform .15s, box-shadow .15s, opacity .15s;
      user-select: none;
      touch-action: none;
      -webkit-user-select: none;
    }
    .drag-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(124,58,237,.35);
    }
    .drag-item:active { cursor: grabbing; }
    .drag-item.dragging {
      opacity: .35;
      transform: scale(.97);
    }

    .drop-zone {
      border: 2px dashed rgba(124,58,237,.35);
      transition: all .2s;
      min-height: 68px;
      border-radius: 16px;
      background: rgba(124,58,237,.05);
    }
    .drop-zone.over {
      border-color: #a78bfa;
      border-style: solid;
      background: rgba(124,58,237,.18);
      transform: scale(1.01);
    }
    .drop-zone.matched-ok {
      border-color: #22c55e;
      border-style: solid;
      background: rgba(34,197,94,.1);
    }
    .drop-zone.matched-err {
      border-color: #ef4444;
      border-style: solid;
      background: rgba(239,68,68,.1);
    }
    .dd-bank-item {
      cursor: grab;
      user-select: none;
      touch-action: none;
      transition: transform .15s, box-shadow .15s, opacity .15s;
      border-radius: 16px;
      border: 1.5px solid rgba(124,58,237,.4);
      background: linear-gradient(135deg,rgba(124,58,237,.18),rgba(79,70,229,.12));
      padding: 12px 14px;
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-weight: 600;
      font-size: .875rem;
      color: #e0d9ff;
      gap: 8px;
      -webkit-user-select: none;
    }
    .dd-bank-item:hover {
      transform: translateY(-2px);
      border-color: #a78bfa;
      box-shadow: 0 8px 20px rgba(124,58,237,.3);
    }
    .dd-bank-item.used {
      opacity: .22;
      pointer-events: none;
      transform: none;
      box-shadow: none;
    }

    .drop-zone.matched {
      border-color: #22c55e;
      background: rgba(34, 197, 94, .1)
    }

    /* Wheel Spin */
    @keyframes wheelGlow {

      0%,
      100% {
        box-shadow: 0 0 20px rgba(124, 58, 237, .6)
      }

      50% {
        box-shadow: 0 0 40px rgba(34, 211, 238, .8)
      }
    }

    @keyframes resultPop {
      0% {
        opacity: 0;
        transform: translateX(-50%) scale(.6)
      }

      60% {
        transform: translateX(-50%) scale(1.08)
      }

      100% {
        opacity: 1;
        transform: translateX(-50%) scale(1)
      }
    }

    .wheel-spin-btn {
      background: linear-gradient(135deg, #7c3aed, #22d3ee);
      color: #fff;
      font-family: 'Kanit', sans-serif;
      font-weight: 700;
      font-size: 1.15rem;
      border: none;
      cursor: pointer;
      border-radius: 50%;
      width: 72px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(124, 58, 237, .5);
      transition: all .2s;
      letter-spacing: .03em
    }

    .wheel-spin-btn:hover {
      filter: brightness(1.15);
      transform: scale(1.06)
    }

    .wheel-spin-btn:active {
      transform: scale(.97)
    }

    .wheel-spin-btn:disabled {
      opacity: .4;
      cursor: not-allowed;
      transform: none
    }

    /* Modal */
    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .75);
      backdrop-filter: blur(6px);
      z-index: 100;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 16px;
      animation: fadeIn .2s ease
    }

    .modal-sheet {
      background: #12121e;
      border: 1px solid rgba(255, 255, 255, .10);
      border-radius: 24px;
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
      animation: slideUp .3s ease
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, .08);
      position: sticky;
      top: 0;
      background: #12121e;
      z-index: 10
    }

    /* Form */
    .form-inp {
      width: 100%;
      background: rgba(255, 255, 255, .07);
      border: 1px solid rgba(255, 255, 255, .15);
      border-radius: 12px;
      padding: 10px 14px;
      color: #fff;
      font-size: 14px;
      font-family: 'Sarabun', sans-serif;
      transition: all .2s;
      outline: none
    }

    .form-inp:focus {
      border-color: #7c3aed;
      box-shadow: 0 0 0 3px rgba(124, 58, 237, .15)
    }

    .form-inp::placeholder {
      color: rgba(255, 255, 255, .28)
    }

    /* Table */
    .tbl {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px
    }

    .tbl th {
      text-align: left;
      padding: 12px 16px;
      background: rgba(255, 255, 255, .04);
      color: rgba(255, 255, 255, .5);
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .05em;
      border-bottom: 1px solid rgba(255, 255, 255, .08)
    }

    .tbl td {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, .06);
      vertical-align: middle
    }

    .tbl tr:hover td {
      background: rgba(255, 255, 255, .03)
    }

    /* Badge */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600
    }

    .bg-green {
      background: rgba(34, 197, 94, .15);
      color: #86efac
    }

    .bg-red {
      background: rgba(239, 68, 68, .15);
      color: #fca5a5
    }

    .bg-amber {
      background: rgba(245, 158, 11, .15);
      color: #fcd34d
    }

    .bg-blue {
      background: rgba(59, 130, 246, .15);
      color: #93c5fd
    }

    .bg-purple {
      background: rgba(124, 58, 237, .15);
      color: #c4b5fd
    }

    /* Stat card */
    .stat-card {
      background: rgba(255, 255, 255, .04);
      border: 1px solid rgba(255, 255, 255, .08);
      border-radius: 16px;
      padding: 20px;
      transition: all .2s
    }

    .stat-card:hover {
      border-color: rgba(124, 58, 237, .3);
      transform: translateY(-2px)
    }

    /* Admin sidebar */
    .adm-nav {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-radius: 12px;
      cursor: pointer;
      transition: all .2s;
      font-size: 14px;
      color: rgba(255, 255, 255, .6);
      text-decoration: none
    }

    .adm-nav:hover {
      background: rgba(255, 255, 255, .06);
      color: #fff
    }

    .adm-nav.active {
      background: rgba(124, 58, 237, .25);
      color: #a78bfa
    }

    /* Line clamp */
    .lc2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden
    }

    body {
      margin-bottom: var(--android-safe-area-inset-bottom, env(safe-area-inset-bottom));
    }
  </style>
</head>

<body>

  <!-- ── Toast container ── -->
  <div id="toasts" class="fixed top-4 right-4 z-50 flex flex-col gap-2 pointer-events-none"></div>

  <!-- ── App root ── -->
  <div id="app"></div>

  <script>
    'use strict';
    // ╔══════════════════════════════════════════════════════════════╗
    // ║  ⚙️  CONFIG                                                 ║
    // ╚══════════════════════════════════════════════════════════════╝
    const LIFF_ID = '2009785071-wSkgakrd';
    const SUPABASE_URL = 'https://bixtzckflnayzyuvqisl.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJpeHR6Y2tmbG5heXp5dXZxaXNsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTQxMTIyMjksImV4cCI6MjA2OTY4ODIyOX0.GiES3FL3RkQ2QBHFbDCOSaFMoXtAYhA__9YN5L1xM54';
    const API_BASE = `${SUPABASE_URL}/functions/v1/miniapp-quiz`;

    // ══════════════════════════════════════════════════════════════
    // SUPABASE CLIENT
    // ══════════════════════════════════════════════════════════════
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function api(route, opts = {}) {
      const url = `${API_BASE}/${route}`;
      const res = await fetch(url, {
        headers: { 'Content-Type': 'application/json', ...opts.headers },
        ...opts,
      });
      return res.json();
    }

    // ══════════════════════════════════════════════════════════════
    // STATE
    // ══════════════════════════════════════════════════════════════
    let USER = null;   // LINE Profile
    let IS_ADMIN = false;
    let STUDENT = null;   // { full_name, student_no, class_name, is_suspended, profile_completed }
    let QUIZ_SET = null;   // ชุดข้อสอบที่กำลังทำ
    let SESSION = null;   // quiz session ปัจจุบัน
    let QUESTIONS = [];     // คำถาม (สุ่มแล้ว)
    let Q_IDX = 0;
    let ANSWERS = {};     // { questionId: { choiceId?, text? } }
    let T_START = 0;      // เวลาเริ่ม session
    let TIMER_IV = null;   // interval timer
    let LB_CHAN = null;   // realtime channel
    let VIEW = 'home'; // admin view
    let SEL_QUIZ = null;   // quiz ที่เลือกใน admin

    // ══════════════════════════════════════════════════════════════
    // TOAST
    // ══════════════════════════════════════════════════════════════
    const ICONS = {
      success: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>',
      error: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>',
      warning: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/></svg>',
      info: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>',
    };
    const TCLS = { success: 'bg-emerald-500 text-white', error: 'bg-red-500 text-white', warning: 'bg-amber-400 text-amber-900', info: 'bg-blue-500 text-white' };

    function toast(msg, type = 'info', ms = 3200) {
      const c = document.getElementById('toasts');
      const t = document.createElement('div');
      t.className = `pointer-events-auto flex items-center gap-3 px-4 py-3 rounded-xl shadow-lg font-medium text-sm
    ${TCLS[type] || TCLS.info} transform translate-x-full transition-all duration-300 max-w-xs`;
      t.innerHTML = `${ICONS[type] || ICONS.info}<span class="flex-1">${msg}</span><button onclick="this.parentElement.remove()" class="opacity-70 hover:opacity-100 ml-1"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>`;
      c.appendChild(t);
      requestAnimationFrame(() => requestAnimationFrame(() => t.classList.replace('translate-x-full', 'translate-x-0')));
      setTimeout(() => { t.classList.add('translate-x-full', 'opacity-0'); setTimeout(() => t.remove(), 300) }, ms);
    }

    // ══════════════════════════════════════════════════════════════
    // LOADER / CONFETTI
    // ══════════════════════════════════════════════════════════════
    function setApp(html) { document.getElementById('app').innerHTML = html; }

    function showLoader(msg = 'กำลังโหลด...') {
      setApp(`<div class="min-h-screen flex flex-col items-center justify-center">
    <div class="relative mb-8 w-20 h-20">
      <div class="absolute inset-0 rounded-full border-4 border-t-purple-500 border-r-transparent border-b-transparent border-l-transparent anim-spin"></div>
      <div class="absolute inset-0 flex items-center justify-center text-2xl">📚</div>
    </div>
    <p class="text-purple-200 font-medium animate-pulse" id="lmsg">${msg}</p>
  </div>`);
    }
    function updLoader(msg) { const e = document.getElementById('lmsg'); if (e) e.textContent = msg; }

    function confetti(ms = 3000) {
      const cv = document.createElement('canvas');
      cv.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;';
      document.body.appendChild(cv);
      const ctx = cv.getContext('2d'), W = cv.width = innerWidth, H = cv.height = innerHeight;
      const COLS = ['#FF6B6B', '#4ECDC4', '#FFE66D', '#A8E6CF', '#FF8B94', '#C3A6FF', '#6BCB77'];
      const P = Array.from({ length: 150 }, () => ({ x: Math.random() * W, y: -20 - Math.random() * 100, w: 8 + Math.random() * 8, h: 4 + Math.random() * 4, c: COLS[Math.floor(Math.random() * 7)], vx: (Math.random() - .5) * 4, vy: 3 + Math.random() * 5, r: Math.random() * Math.PI * 2, rs: (Math.random() - .5) * .2, a: 1 }));
      let s = null;
      (function draw(t) {
        if (!s) s = t; ctx.clearRect(0, 0, W, H);
        P.forEach(p => {
          p.x += p.vx; p.y += p.vy; p.vy += .1; p.r += p.rs; if (t - s > ms - 1000) p.a = Math.max(0, p.a - .02);
          ctx.save(); ctx.globalAlpha = p.a; ctx.translate(p.x, p.y); ctx.rotate(p.r); ctx.fillStyle = p.c; ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h); ctx.restore();
        });
        if (t - s < ms + 500) requestAnimationFrame(draw); else cv.remove();
      })(performance.now());
    }

    function skeletons(n = 3) { return Array(n).fill(`<div class="skeleton rounded-2xl h-32 mb-3"></div>`).join('') }
    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML }
    function fmtT(s) { return `${Math.floor(s / 60)}:${(s % 60).toString().padStart(2, '0')}` }
    function shuffle(a) { const b = [...a]; for (let i = b.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[b[i], b[j]] = [b[j], b[i]]; } return b; }

    // ══════════════════════════════════════════════════════════════
    // INIT — LINE LIFF
    // ══════════════════════════════════════════════════════════════
    async function init() {
      showLoader('กำลังยืนยันตัวตนผ่าน LINE...');
      try {
        await liff.init({ liffId: LIFF_ID, withLoginOnExternalBrowser: true });
        await liff.ready;
        if (!liff.isLoggedIn()) { liff.login({ redirectUri: location.href }); return; }

        // Friendship
        try {
          const f = await liff.getFriendship();
          if (!f.friendFlag) {
            if (typeof liff.requestFriendship === 'function') await liff.requestFriendship();
            const v = await liff.getFriendship();
            toast(v.friendFlag ? 'ขอบคุณที่เพิ่มเราเป็นเพื่อน! 🎉' : 'ยังไม่ได้เพิ่ม OA เป็นเพื่อน', v.friendFlag ? 'success' : 'warning');
          }
        } catch (e) { console.warn('friendship', e); }

        USER = await liff.getProfile();
        updLoader('กำลังตรวจสอบข้อมูล...');

        // Upsert profile + get role + student info
        const res = await api('upsert-profile', {
          method: 'POST',
          body: JSON.stringify({ userId: USER.userId, displayName: USER.displayName, pictureUrl: USER.pictureUrl, statusMessage: USER.statusMessage }),
        });
        IS_ADMIN = res.role === 'admin';
        STUDENT = { full_name: res.full_name, student_no: res.student_no, class_name: res.class_name, is_suspended: res.is_suspended, profile_completed: res.profile_completed };

        // ถ้า URL มี ?admin=1 และเป็น admin → ไปหน้า admin
        if (new URLSearchParams(location.search).get('admin') === '1' && IS_ADMIN) {
          renderAdmin();
        } else if (STUDENT.is_suspended) {
          renderSuspended();
        } else if (!STUDENT.profile_completed) {
          renderStudentProfileForm();

          renderHome();

        setApp(`<div class="min-h-screen flex items-center justify-center p-6"><div class="text-center"><div class="text-5xl mb-4">⚠️</div>
      <h2 class="font-bold text-xl mb-2 text-red-400">เกิดข้อผิดพลาด</h2>

    async function saveStudentProfile() {
      const full_name = document.getElementById('inp-fullname')?.value.trim();
      const student_no = document.getElementById('inp-studentno')?.value.trim();
      const class_name = document.getElementById('inp-class')?.value.trim();
      const errEl = document.getElementById('profile-err');

      if (!full_name || !student_no || !class_name) {
        errEl.textContent = 'กรุณากรอกข้อมูลให้ครบทุกช่อง';
        errEl.classList.remove('hidden'); return;
      }
      errEl.classList.add('hidden');

      try {
        const res = await api('save-student-profile', {
          method: 'POST',
          body: JSON.stringify({ userId: USER.userId, full_name, student_no, class_name }),
        });
        if (!res.ok) { errEl.textContent = res.error || 'บันทึกไม่สำเร็จ'; errEl.classList.remove('hidden'); return; }
        STUDENT = { ...STUDENT, full_name, student_no, class_name, profile_completed: true };
        toast(`บันทึกข้อมูลสำเร็จ! ยินดีต้อนรับ ${full_name} 🎉`, 'success');

      } catch (e) { errEl.textContent = e.message; errEl.classList.remove('hidden'); }

    const QICON = { multiple_choice: '📝', fill_blank: '✏️', drag_drop: '🎯', wheel_spin: '🎡', true_false: '✅', memory: '🧠', match: '🃏', wheel_spin: '🎡' };

    function renderQuizCards(list) {

      g.innerHTML = `<div class="grid grid-cols-2 gap-3">` + list.map(q => {

      ${q.thumbnail_url ? `<img src="${q.thumbnail_url}" class="w-full h-24 object-cover rounded-xl mb-2" alt=""/>` : ''}

      <p class="text-xs text-white/40">${q.time_limit_seconds > 0 ? `⏱ ${q.time_limit_seconds / 60} นาที` : '⏱ ไม่จำกัด'}</p>

    // ══════════════════════════════════════════════════════════════
    // OPEN QUIZ — รายละเอียด + Leaderboard Realtime
    // ══════════════════════════════════════════════════════════════
    let VIDEO_WATCHED = false;

    async function openQuiz(id) {
      showLoader('กำลังโหลดแบบทดสอบ...');
      unsubLB();
      try {
        // ตรวจสอบสิทธิ์ก่อนโหลดเนื้อหา
        const check = await api(`check-attempt?user_id=${USER.userId}&quiz_set_id=${id}`);
        if (!check.allowed) {
          if (check.reason === 'suspended') { renderSuspended(); return; }
          if (check.reason === 'already_completed' || check.reason === 'in_progress') {
            const s = check.session;
            const m = Math.floor((s.time_spent_seconds || 0) / 60), sec = (s.time_spent_seconds || 0) % 60;
            setApp(`
        <div class="min-h-screen flex items-center justify-center px-4">
          <div class="max-w-sm w-full text-center">
            <div class="text-6xl mb-4">${s.is_passed ? '🎉' : '📝'}</div>
            <h2 class="text-xl font-bold font-kanit mb-1">${check.reason === 'in_progress' ? 'กำลังทำอยู่' : 'ทำแบบทดสอบนี้แล้ว'}</h2>
            <p class="text-white/50 text-sm mb-5">${check.reason === 'in_progress' ? 'คุณมีเซสชันค้างอยู่' : 'คุณได้ทำแบบทดสอบนี้ครบแล้ว ไม่สามารถทำซ้ำได้'}</p>
            ${s.percentage != null ? `
            <div class="glass rounded-2xl border border-white/10 p-5 mb-5">
              <div class="text-3xl font-bold font-kanit ${s.is_passed ? 'text-green-400' : 'text-amber-400'} mb-1">${Number(s.percentage).toFixed(0)}%</div>
              <div class="text-sm text-white/50">คะแนน ${s.total_score}/${s.max_score}</div>
              <div class="mt-2"><span class="badge ${s.is_passed ? 'bg-green' : 'bg-red'}">${s.is_passed ? '✓ ผ่าน' : '✗ ไม่ผ่าน'}</span></div>
              <div class="text-xs text-white/30 mt-2">เวลา ${m}:${sec.toString().padStart(2, '0')} น. | ${new Date(s.completed_at).toLocaleDateString('th-TH', { dateStyle: 'medium' })}</div>
            </div>` : ''}
            <button onclick="renderHome()" class="w-full py-4 rounded-2xl btn-grad font-bold shadow-lg">🏠 กลับหน้าหลัก</button>
          </div>
        </div>`);
            return;
          }
        }
        const { data: q } = await sb.from('quiz_sets')
          .select('*,quiz_questions(*,quiz_choices(*),quiz_drag_pairs(*))')
          .eq('id', id).single();
        QUIZ_SET = q;
        console.log('[openQuiz] quiz_set loaded:', q?.id, q?.title, '| quiz_questions count:', q?.quiz_questions?.length, '| quiz_type:', q?.quiz_type);
        VIDEO_WATCHED = !q.video_required;

        // ── Memory game → เปิดหน้าเกม ──
        if (q.quiz_type === 'memory') { openMemoryGame(q); return; }
        // ── Match game → เปิดหน้าเกมจับคู่ ──
        if (q.quiz_type === 'match') { openMatchGame(q); return; }
        // ── Wheel Spin game ──
        if (q.quiz_type === 'wheel_spin') { openWheelGame(q); return; }

        const lb = await getLB(id);

        setApp(`
    <nav class="sticky top-0 z-40 glass border-b border-white/10 px-4 py-3">
      <div class="flex items-center gap-3 max-w-lg mx-auto">
        <button onclick="renderHome()" class="p-2 rounded-xl hover:bg-white/10 transition"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg></button>
        <h1 class="font-bold text-sm flex-1 truncate font-kanit">${esc(q.title)}</h1>
      </div>
    </nav>
    <div class="max-w-lg mx-auto px-4 py-6">
      ${q.thumbnail_url ? `<img src="${q.thumbnail_url}" class="w-full h-44 object-cover rounded-2xl mb-4" alt=""/>` : ''}
      ${q.video_url ? `<div class="mb-4"><p class="text-xs text-amber-400 mb-2 font-medium">⚠️ กรุณาดูวิดีโอให้จบก่อนทำแบบทดสอบ</p>
        <div class="rounded-2xl overflow-hidden bg-black aspect-video"><video id="qvideo" controls class="w-full h-full"><source src="${q.video_url}"/>เบราว์เซอร์ไม่รองรับวิดีโอ</video></div></div>` : ''}
      <div class="glass rounded-2xl p-5 border border-white/10 mb-5">
        ${q.description ? `<p class="text-white/70 text-sm mb-4">${esc(q.description)}</p>` : ''}
        <div class="grid grid-cols-2 gap-3 text-sm mb-5">
          ${[['จำนวนข้อ', `${q.quiz_questions?.length || 0} ข้อ`], ['เวลา', q.time_limit_seconds > 0 ? `${q.time_limit_seconds / 60} นาที` : 'ไม่จำกัด'], ['คะแนนผ่าน', `${q.pass_score}%`], ['ประเภท', TBADGE[q.test_type]?.[0] || '-']].map(([l, v]) => `<div class="bg-white/5 rounded-xl p-3"><div class="text-white/40 text-xs mb-1">${l}</div><div class="font-bold">${v}</div></div>`).join('')}
        </div>
        <button id="start-btn" onclick="startQuiz()" class="w-full py-4 rounded-2xl btn-grad font-bold text-lg shadow-lg" ${q.video_required && !VIDEO_WATCHED ? 'disabled' : ''}>
          🚀 เริ่มทำแบบทดสอบ
        </button>
      </div>
      <!-- Leaderboard -->
      <div class="glass rounded-2xl border border-white/10 overflow-hidden">
        <div class="flex items-center justify-between px-4 py-3 border-b border-white/10">
          <h3 class="font-bold text-sm font-kanit">🏆 อันดับ Realtime</h3>
          <div class="flex items-center gap-1"><div class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></div><span class="text-xs text-white/40">Live</span></div>
        </div>
        <div id="lb-box" class="p-3 space-y-2 max-h-72 overflow-y-auto">${renderLBHtml(lb)}</div>
      </div>
    </div>`);

        subLB(id);

        if (q.video_required) {
          document.getElementById('qvideo')?.addEventListener('ended', () => {
            VIDEO_WATCHED = true;
            document.getElementById('start-btn')?.removeAttribute('disabled');
            toast('ดูวิดีโอจบแล้ว! พร้อมทำแบบทดสอบ 🎉', 'success');
          });
        }
      } catch (e) { toast('โหลดไม่สำเร็จ', 'error'); renderHome(); }
    }

    // ══════════════════════════════════════════════════════════════
    // LEADERBOARD helpers
    // ══════════════════════════════════════════════════════════════
    async function getLB(quizSetId, lim = 20) {
      const { data } = await sb.from('quiz_leaderboard')
        .select('*').eq('quiz_set_id', quizSetId)
        .order('score', { ascending: false }).order('time_spent_seconds', { ascending: true }).limit(lim);
      return data || [];
    }

    const MEDALS = ['🥇', '🥈', '🥉'];
    function renderLBHtml(entries) {
      if (!entries.length) return `<div class="text-center py-8 text-white/40 text-sm">ยังไม่มีข้อมูลคะแนน</div>`;
      return entries.map((e, i) => {
        const isMe = e.user_id === USER?.userId;
        const av = e.picture_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(e.display_name)}&background=6366f1&color=fff`;
        return `<div class="flex items-center gap-3 p-3 rounded-xl border ${isMe ? 'border-purple-500 bg-purple-500/10' : 'border-white/10 bg-white/5'}">
      <div class="w-7 text-center">${i < 3 ? MEDALS[i] : `<span class="text-xs text-white/40">#${i + 1}</span>`}</div>
      <img src="${av}" class="w-9 h-9 rounded-full object-cover border-2 ${isMe ? 'border-purple-400' : 'border-white/20'}" onerror="this.src='https://ui-avatars.com/api/?name=U&background=6366f1&color=fff'" alt=""/>
      <div class="flex-1 min-w-0"><p class="font-semibold text-sm truncate ${isMe ? 'text-purple-200' : ''}">${esc(e.display_name)}${isMe ? ' <span class="text-xs text-purple-400">(คุณ)</span>' : ''}</p><p class="text-xs text-white/40">${fmtT(e.time_spent_seconds)}</p></div>
      <div class="text-right"><div class="font-bold ${i === 0 ? 'text-yellow-400' : i === 1 ? 'text-slate-300' : i === 2 ? 'text-amber-600' : 'text-white'}">${e.score}</div><div class="text-xs text-white/40">${Number(e.percentage).toFixed(0)}%</div></div>
    </div>`;
      }).join('');
    }

    function subLB(quizSetId) {
      LB_CHAN = sb.channel(`lb:${quizSetId}`)
        .on('postgres_changes', { event: '*', schema: 'public', table: 'quiz_leaderboard', filter: `quiz_set_id=eq.${quizSetId}` },
          async () => { const d = await getLB(quizSetId); const b = document.getElementById('lb-box'); if (b) b.innerHTML = renderLBHtml(d); })
        .subscribe();
    }
    function unsubLB() { if (LB_CHAN) { sb.removeChannel(LB_CHAN); LB_CHAN = null; } }

    // ══════════════════════════════════════════════════════════════
    // START QUIZ
    // ══════════════════════════════════════════════════════════════
    async function startQuiz() {
      showLoader('กำลังเตรียมแบบทดสอบ...');
      unsubLB();

      // ══ กำหนดโหมด: บันทึก DB เฉพาะเมื่อจับเวลา (time_limit_seconds > 0) ══
      const SAVE_TO_DB = QUIZ_SET.time_limit_seconds > 0;

      try {
        if (SAVE_TO_DB) {
          const { count } = await sb.from('quiz_sessions')
            .select('*', { count: 'exact', head: true }).eq('quiz_set_id', QUIZ_SET.id).eq('user_id', USER.userId);
          const { data: sess } = await sb.from('quiz_sessions').insert({
            user_id: USER.userId, quiz_set_id: QUIZ_SET.id, attempt_number: (count || 0) + 1, status: 'in_progress',
            student_full_name: STUDENT?.full_name || null,
            student_no: STUDENT?.student_no || null,
            student_class: STUDENT?.class_name || null,
          }).select().single();
          SESSION = sess;
        } else {
          SESSION = null; // ไม่จับเวลา ไม่บันทึก DB
        }

        // สุ่มคำถาม
        let qs = [...(QUIZ_SET.quiz_questions || [])];
        if (QUIZ_SET.shuffle_questions) qs = shuffle(qs);
        if (QUIZ_SET.shuffle_choices) qs = qs.map(q => ({ ...q, quiz_choices: q.quiz_choices ? shuffle(q.quiz_choices) : q.quiz_choices }));
        QUESTIONS = qs; Q_IDX = 0; ANSWERS = {}; T_START = Date.now();

        // ── ตรวจสอบ: ถ้าไม่มีคำถาม ห้ามเริ่ม ──
        if (QUESTIONS.length === 0) {
          console.warn('[startQuiz] QUESTIONS is empty — quiz_set id:', QUIZ_SET.id, 'quiz_questions:', QUIZ_SET.quiz_questions);
          setApp(`
  <div class="min-h-screen flex items-center justify-center px-4">
    <div class="max-w-sm w-full text-center">
      <div class="text-6xl mb-4">📭</div>
      <h2 class="text-xl font-bold font-kanit mb-2">ยังไม่มีคำถามในชุดนี้</h2>
      <p class="text-white/50 text-sm mb-2">ชุดแบบทดสอบ <span class="text-white/80 font-semibold">${esc(QUIZ_SET.title)}</span></p>
      <p class="text-white/40 text-xs mb-6">กรุณา Import คำถามจาก CSV หรือติดต่อผู้ดูแลระบบ</p>
      <button onclick="renderHome()" class="w-full py-4 rounded-2xl btn-grad font-bold shadow-lg">🏠 กลับหน้าหลัก</button>
    </div>
  </div>`);
          toast('ยังไม่มีคำถามในชุดนี้', 'warning');
          return;
        }

        if (QUIZ_SET.time_limit_seconds > 0) startTimer(QUIZ_SET.time_limit_seconds);
        renderQ();
      } catch (e) { toast('เริ่มแบบทดสอบไม่สำเร็จ', 'error'); console.error(e); }
    }

    // ══════════════════════════════════════════════════════════════
    // RENDER QUESTION
    // ══════════════════════════════════════════════════════════════
    function renderQ() {
      // ── Guard: ถ้า QUESTIONS ว่างหรือหมด ──
      if (!QUESTIONS || QUESTIONS.length === 0) {
        console.warn('[renderQ] QUESTIONS is empty, cannot render.');
        toast('ไม่พบคำถามในแบบทดสอบนี้', 'error');
        renderHome(); return;
      }
      if (Q_IDX >= QUESTIONS.length) { finishQuiz(); return; }
      const q = QUESTIONS[Q_IDX];
      const pct = ((Q_IDX + 1) / QUESTIONS.length) * 100;
      const isLast = Q_IDX === QUESTIONS.length - 1;

      let body = '';
      if (q.question_type === 'multiple_choice' || q.question_type === 'true_false') {
        body = `<div class="space-y-3">${(q.quiz_choices || []).map((c, i) => `
      <button onclick="selChoice('${c.id}',this)" data-cid="${c.id}"
        class="choice-btn w-full text-left p-4 rounded-2xl border border-white/15 bg-white/5 hover:bg-purple-600/20 hover:border-purple-500/50 transition-all font-medium text-sm flex items-start gap-3">
        <span class="w-7 h-7 rounded-lg bg-white/10 flex items-center justify-center flex-shrink-0 text-xs font-bold">${String.fromCharCode(65 + i)}</span>
        <span class="flex-1 pt-0.5">${c.choice_image_url ? `<img src="${c.choice_image_url}" class="w-full max-h-28 object-contain rounded-xl mb-2 bg-white/5" onerror="this.style.display='none'" alt=""/>` : ''}${esc(c.choice_text)}</span>
      </button>`).join('')}</div>`;
      } else if (q.question_type === 'fill_blank') {
        body = `<div class="space-y-4">
      <input type="text" id="fill-inp" placeholder="พิมพ์คำตอบที่นี่..."
        class="form-inp text-base py-4 px-5" onkeydown="if(event.key==='Enter')submitFill()"/>
      <button onclick="submitFill()" class="w-full py-4 rounded-2xl btn-grad font-bold text-sm shadow-lg">✓ ยืนยันคำตอบ</button>
    </div>`;
      } else if (q.question_type === 'drag_drop') {
        body = renderDragBody(q.quiz_drag_pairs || []);
      }

      setApp(`
  <div class="sticky top-0 z-40 glass border-b border-white/10 px-4 py-3">
    <div class="max-w-lg mx-auto">
      <div class="flex items-center justify-between mb-2">
        <span class="text-xs text-white/50">ข้อ ${Q_IDX + 1} / ${QUESTIONS.length}</span>
        <span id="timer-el" class="text-xs font-bold text-white/70"></span>
      </div>
      <div class="h-2 bg-white/10 rounded-full overflow-hidden">
        <div class="h-full rounded-full bg-gradient-to-r from-purple-600 to-cyan-500 transition-all duration-500" style="width:${pct}%"></div>
      </div>
    </div>
  </div>
  <div class="max-w-lg mx-auto px-4 py-6">
    <div class="glass rounded-3xl border border-white/10 p-5 mb-5 anim-fade">
      ${q.question_image_url ? `<img src="${q.question_image_url}" class="w-full max-h-44 object-contain rounded-2xl mb-4 bg-white/5" onerror="this.style.display='none'" alt=""/>` : ''}
      <p class="font-semibold text-base leading-relaxed text-white">${esc(q.question_text)}</p>
      ${q.difficulty ? `<span class="text-xs text-white/30 mt-1 block">${{ easy: '🟢 ง่าย', medium: '🟡 ปานกลาง', hard: '🔴 ยาก' }[q.difficulty] || ''}</span>` : ''}
    </div>
    ${body}
    <div class="flex gap-3 mt-6">
      ${Q_IDX > 0 ? `<button onclick="Q_IDX--;renderQ()" class="flex-1 py-3 rounded-2xl border border-white/20 text-white/70 hover:bg-white/10 transition font-medium text-sm">← ย้อนกลับ</button>` : '<div class="flex-1"></div>'}
      ${q.question_type !== 'fill_blank' && q.question_type !== 'drag_drop' ? `<button onclick="nextQ()" class="flex-1 py-3 rounded-2xl btn-grad font-bold text-sm shadow-lg">${isLast ? '✓ ส่งคำตอบ' : 'ถัดไป →'}</button>` : ''}
    </div>
  </div>`);
    }

    function selChoice(cid, btn) {
      document.querySelectorAll('.choice-btn').forEach(b => { b.classList.remove('sel'); b.classList.add('border-white/15', 'bg-white/5'); });
      btn.classList.add('sel'); btn.classList.remove('border-white/15', 'bg-white/5');
      ANSWERS[QUESTIONS[Q_IDX].id] = { choiceId: cid };
    }
    function submitFill() {
      const v = document.getElementById('fill-inp')?.value.trim();
      if (!v) { toast('กรุณาพิมพ์คำตอบก่อน', 'warning'); return; }
      ANSWERS[QUESTIONS[Q_IDX].id] = { text: v };
      Q_IDX++; renderQ();
    }
    function nextQ() { Q_IDX++; renderQ(); }

    function startTimer(total) {
      let rem = total;
      TIMER_IV = setInterval(() => {
        rem--;
        const e = document.getElementById('timer-el');
        if (e) { e.textContent = `⏱ ${fmtT(rem)}`; if (rem <= 60) e.classList.add('text-red-400'); }
        if (rem <= 0) { clearInterval(TIMER_IV); finishQuiz(); }
      }, 1000);
    }

    // ══════════════════════════════════════════════════════════════
    // DRAG & DROP (inline)
    // ══════════════════════════════════════════════════════════════
    let DD_PAIRS = [], DD_MATCH = {}, DD_DRAGGING = null, DD_TPID = null, DD_CLONE = null;

    function renderDragBody(pairs) {
      DD_PAIRS = pairs; DD_MATCH = {};
      const left  = pairs.map(p => ({ id: p.id, text: p.left_item,  img: p.left_image_url }));
      const right = shuffle(pairs.map(p => ({ id: p.id, text: p.right_item, img: p.right_image_url })));

      return `
  <!-- คำแนะนำ -->
  <div class="flex items-center justify-center gap-2 mb-5">
    <span class="text-lg">🎯</span>
    <p class="text-xs text-white/55 font-medium">ลากคำจากด้านล่างวางลงช่องที่ตรงกัน</p>
  </div>

  <!-- คอลัมน์จับคู่: ซ้าย = คำตั้ง, ขวา = drop zone -->
  <div class="space-y-3 mb-6">
    ${left.map(p => `
    <div class="flex items-stretch gap-3" style="min-height:70px">
      <!-- Label ซ้าย -->
      <div class="flex items-center gap-2 glass border border-white/12 rounded-2xl px-4 py-3 flex-1" style="flex:1 1 0;min-width:0">
        ${p.img ? `<img src="${p.img}" class="w-10 h-10 object-contain rounded-xl flex-shrink-0" alt=""/>` : 
          `<span class="w-7 h-7 rounded-lg bg-purple-500/20 flex items-center justify-center text-purple-300 text-xs font-bold flex-shrink-0">→</span>`}
        <span class="font-semibold text-sm leading-snug">${esc(p.text)}</span>
      </div>
      <!-- Drop zone ขวา -->
      <div class="drop-zone flex items-center justify-center text-xs text-white/35 font-medium px-3"
        data-pid="${p.id}" id="dz-${p.id}"
        ondragover="event.preventDefault();ddDragOver(this)"
        ondragleave="ddDragLeave(this)"
        ondrop="ddDrop(event,'${p.id}')"
        style="flex:1 1 0;min-width:0;cursor:copy">
        <span id="dz-label-${p.id}" class="flex items-center gap-2"><span style="font-size:1.2rem">＋</span> วางที่นี่</span>
      </div>
    </div>`).join('')}
  </div>

  <!-- ตะกร้า drag items -->
  <div class="glass border border-white/10 rounded-2xl p-4 mb-5">
    <p class="text-xs text-white/40 mb-3 font-medium">📦 รายการที่ต้องจับคู่</p>
    <div class="grid gap-2" id="dd-bank" style="grid-template-columns:repeat(auto-fill,minmax(120px,1fr))">
      ${right.map(p => `
      <div class="dd-bank-item"
        id="dg-${p.id}" data-pid="${p.id}" draggable="true"
        ondragstart="ddDragStart(event,'${p.id}')"
        ondragend="ddDragEnd(event,'${p.id}')"
        ontouchstart="ddTouchStart(event,'${p.id}')" ontouchmove="ddTouchMove(event)" ontouchend="ddTouchEnd(event)">
        ${p.img ? `<img src="${p.img}" class="w-10 h-10 object-contain rounded-xl flex-shrink-0" alt=""/>` : ''}
        <span>${esc(p.text)}</span>
      </div>`).join('')}
    </div>
  </div>

  <button onclick="submitDD()" class="w-full py-4 rounded-2xl btn-grad font-bold text-sm shadow-lg">✓ ตรวจคำตอบ</button>`;
    }

    /* ── helpers drag/drop desktop ── */
    function ddDragStart(e, pid) {
      DD_DRAGGING = pid;
      e.dataTransfer.effectAllowed = 'move';
      setTimeout(() => document.getElementById(`dg-${pid}`)?.classList.add('dragging'), 0);
    }
    function ddDragEnd(e, pid) {
      DD_DRAGGING = null;
      document.getElementById(`dg-${pid}`)?.classList.remove('dragging');
    }
    function ddDragOver(el) {
      document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('over'));
      el.classList.add('over');
    }
    function ddDragLeave(el) { el.classList.remove('over'); }

    function ddDrop(e, zonePid) {
      e.preventDefault();
      document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('over'));
      const pid = DD_DRAGGING || DD_TPID; if (!pid) return;

      // คืน item เดิมในช่องนี้ (ถ้ามี)
      const prevPid = DD_MATCH[zonePid];
      if (prevPid && prevPid !== pid) {
        const prevEl = document.getElementById(`dg-${prevPid}`);
        if (prevEl) { prevEl.classList.remove('used'); }
      }
      // ถ้า item นี้เคยถูกวางในช่องอื่น ให้ล้างช่องเก่า
      for (const [zid, mid] of Object.entries(DD_MATCH)) {
        if (mid === pid && zid !== zonePid) {
          delete DD_MATCH[zid];
          const oldDz = document.getElementById(`dz-${zid}`);
          if (oldDz) {
            oldDz.classList.remove('matched-ok','matched-err');
            oldDz.innerHTML = `<span id="dz-label-${zid}" class="flex items-center gap-2"><span style="font-size:1.2rem">＋</span> วางที่นี่</span>`;
          }
        }
      }

      DD_MATCH[zonePid] = pid;
      const pair = DD_PAIRS.find(p => p.id === pid);
      const dz = document.getElementById(`dz-${zonePid}`);
      if (dz) {
        dz.classList.remove('matched-ok','matched-err');
        dz.innerHTML = `
          <div class="flex items-center gap-2 font-semibold text-sm text-purple-200 px-1">
            ${pair?.right_image_url ? `<img src="${pair.right_image_url}" class="w-8 h-8 object-contain rounded-lg" alt=""/>` : ''}
            <span>${esc(pair?.right_item || '')}</span>
            <button onclick="ddClearZone('${zonePid}')" class="ml-auto text-white/30 hover:text-white/70 text-lg leading-none flex-shrink-0" title="ล้าง">✕</button>
          </div>`;
        dz.style.cursor = 'default';
      }
      const dg = document.getElementById(`dg-${pid}`);
      if (dg) dg.classList.add('used');
      DD_TPID = null;
    }

    function ddClearZone(zonePid) {
      const pid = DD_MATCH[zonePid]; if (!pid) return;
      delete DD_MATCH[zonePid];
      const dg = document.getElementById(`dg-${pid}`);
      if (dg) dg.classList.remove('used');
      const dz = document.getElementById(`dz-${zonePid}`);
      if (dz) {
        dz.classList.remove('matched-ok','matched-err');
        dz.innerHTML = `<span id="dz-label-${zonePid}" class="flex items-center gap-2"><span style="font-size:1.2rem">＋</span> วางที่นี่</span>`;
        dz.style.cursor = 'copy';
      }
    }

    /* ── touch drag ── */
    function ddTouchStart(e, pid) {
      DD_TPID = pid;
      const el = e.currentTarget;
      const r = el.getBoundingClientRect();
      DD_CLONE = el.cloneNode(true);
      Object.assign(DD_CLONE.style, {
        position: 'fixed', top: r.top+'px', left: r.left+'px',
        width: r.width+'px', zIndex: 2000, opacity: '.9',
        pointerEvents: 'none', borderRadius: '16px',
        boxShadow: '0 16px 40px rgba(0,0,0,.5)',
        transform: 'scale(1.06)',
        transition: 'none',
      });
      document.body.appendChild(DD_CLONE);
      el.classList.add('used');
    }
    function ddTouchMove(e) {
      if (!DD_CLONE) return;
      e.preventDefault();
      const t = e.touches[0];
      const cw = DD_CLONE.offsetWidth, ch = DD_CLONE.offsetHeight;
      DD_CLONE.style.left = (t.clientX - cw/2) + 'px';
      DD_CLONE.style.top  = (t.clientY - ch/2) + 'px';
      document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('over'));
      const el = document.elementFromPoint(t.clientX, t.clientY);
      el?.closest('.drop-zone')?.classList.add('over');
    }
    function ddTouchEnd(e) {
      if (!DD_CLONE) return;
      const t = e.changedTouches[0];
      DD_CLONE.remove(); DD_CLONE = null;
      document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('over'));
      // คืน opacity ถ้าไม่โดน drop zone
      const el = document.elementFromPoint(t.clientX, t.clientY);
      const zone = el?.closest('.drop-zone');
      if (zone) {
        ddDrop(new Event('drop'), zone.dataset.pid);
      } else {
        const dg = document.getElementById(`dg-${DD_TPID}`);
        if (dg && !Object.values(DD_MATCH).includes(DD_TPID)) dg.classList.remove('used');
        DD_TPID = null;
      }
    }

    function submitDD() {
      if (Object.keys(DD_MATCH).length < DD_PAIRS.length) {
        toast(`ยังจับคู่ไม่ครบ (${Object.keys(DD_MATCH).length}/${DD_PAIRS.length})`, 'warning'); return;
      }
      let correct = 0;
      DD_PAIRS.forEach(p => {
        const dz = document.getElementById(`dz-${p.id}`);
        const ok = DD_MATCH[p.id] === p.id;
        if (ok) {
          correct++;
          dz?.classList.add('matched-ok');
          if (dz) dz.innerHTML = `
            <div class="flex items-center gap-2 font-semibold text-sm text-green-300 px-1">
              <span class="text-green-400 text-base">✓</span>
              ${p.right_image_url ? `<img src="${p.right_image_url}" class="w-7 h-7 object-contain rounded-lg" alt=""/>` : ''}
              <span>${esc(p.right_item)}</span>
            </div>`;
        } else {
          dz?.classList.add('matched-err');
          if (dz) dz.innerHTML = `
            <div class="flex items-center gap-2 font-semibold text-sm text-red-300 px-1">
              <span class="text-red-400 text-base">✗</span>
              <span>${esc(p.right_item)}</span>
              <span class="text-white/30 text-xs ml-1">(ผิด)</span>
            </div>`;
        }
      });
      ANSWERS[QUESTIONS[Q_IDX].id] = { drag: DD_MATCH };
      const pct = Math.round(correct / DD_PAIRS.length * 100);
      if (pct === 100) confetti();
      toast(`จับคู่ถูก ${correct}/${DD_PAIRS.length} คู่ 🎯`, pct >= 80 ? 'success' : 'warning');
      document.querySelector('[onclick="submitDD()"]')?.remove();
      setTimeout(() => { Q_IDX++; renderQ(); }, 1800);
    }

    // ══════════════════════════════════════════════════════════════
    // FINISH QUIZ
    // ══════════════════════════════════════════════════════════════
    async function finishQuiz() {
      clearInterval(TIMER_IV);
      showLoader('กำลังตรวจคำตอบ...');
      const timeSpent = Math.floor((Date.now() - T_START) / 1000);

      // ── คำนวณคะแนน (ทำทุกโหมด) ──
      let total = 0, max = 0, correct = 0;
      QUESTIONS.forEach(q => {
        max += q.points;
        const ans = ANSWERS[q.id];
        let ok = false;
        if (q.question_type === 'multiple_choice' || q.question_type === 'true_false') {
          const cc = q.quiz_choices?.find(c => c.is_correct);
          ok = ans?.choiceId === cc?.id;
        } else if (q.question_type === 'fill_blank') {
          ok = (ans?.text || '').trim().toLowerCase() === (q.correct_answer || '').trim().toLowerCase();
        } else if (q.question_type === 'drag_drop') {
          const ddM = ans?.drag || {};
          const ddC = (q.quiz_drag_pairs || []).filter(p => ddM[p.id] === p.id).length;
          correct += ddC; total += ddC; max -= q.points;
          max += (q.quiz_drag_pairs || []).length; return;
        }
        if (ok) { total += q.points; correct++; }
      });
      const pct = max > 0 ? parseFloat(((total / max) * 100).toFixed(2)) : 0;
      const isPassed = pct >= (QUIZ_SET.pass_score ?? 60);

      // ── บันทึก DB เฉพาะเมื่อมี SESSION (time_limit_seconds > 0) ──
      // ส่งเฉพาะ summary ที่ใช้ใน Flex Message เท่านั้น ไม่บันทึก quiz_answers
      if (SESSION) {
        try {
          await api('complete-session', {
            method: 'POST',
            body: JSON.stringify({
              sessionId: SESSION.id,
              // ── Flex vars ──
              totalScore: total,
              maxScore: max,
              percentage: pct,
              correctCount: correct,
              totalQuestions: QUESTIONS.length,
              isPassed: isPassed,
              timeSpentSeconds: timeSpent,
              // ── user info ──
              userId: USER.userId,
              displayName: USER.displayName,
              pictureUrl: USER.pictureUrl,
              fullName: STUDENT?.full_name || USER.displayName,
              studentNo: STUDENT?.student_no || '',
              className: STUDENT?.class_name || '',
            }),
          });
        } catch (e) { console.error('complete-session error:', e); }
      }

      if (isPassed) confetti();

      // ── ส่ง Flex เสมอ ──
      await sendScoreFlexMessage({ total, max, pct, correct, isPassed, timeSpent });

      const m = Math.floor(timeSpent / 60), s = timeSpent % 60;
      const isSaved = !!SESSION;

      setApp(`
  <div class="min-h-screen flex items-center justify-center px-4 py-8">
    <div class="max-w-sm w-full">
      <div class="text-center mb-6 anim-bounce">
        <div class="text-7xl mb-3">${isPassed ? '🎉' : '📚'}</div>
        <h2 class="text-2xl font-bold font-kanit ${isPassed ? 'text-green-400' : 'text-amber-400'}">${isPassed ? 'สอบผ่าน!' : 'ยังไม่ผ่าน'}</h2>
        ${!isSaved ? `<p class="text-xs text-white/40 mt-1">โหมดฝึกหัด — ไม่บันทึกผล</p>` : ''}
      </div>
      <div class="glass rounded-3xl border border-white/10 p-6 mb-5 text-center">
        <div class="relative w-36 h-36 mx-auto mb-4">
          <svg class="w-36 h-36 transform -rotate-90">
            <circle cx="72" cy="72" r="60" stroke="white" stroke-opacity=".1" stroke-width="10" fill="none"/>
            <circle cx="72" cy="72" r="60" stroke="${isPassed ? '#22c55e' : '#f59e0b'}" stroke-width="10" fill="none"
              stroke-dasharray="${2 * Math.PI * 60}" stroke-dashoffset="${2 * Math.PI * 60 * (1 - pct / 100)}" stroke-linecap="round"/>
          </svg>
          <div class="absolute inset-0 flex flex-col items-center justify-center">
            <span class="text-3xl font-bold font-kanit">${pct.toFixed(0)}%</span>

    // ══════════════════════════════════════════════════════════════
    // MEMORY GAME — เกมเปิดภาพความจำ
    // ══════════════════════════════════════════════════════════════
    let MEM_CARDS = [], MEM_FLIPPED = [], MEM_MATCHED = new Set(), MEM_LOCKED = false;
    let MEM_START = 0, MEM_TIMER = null, MEM_MOVES = 0, MEM_LB_CHAN = null;

    async function openMemoryGame(quizSet) {
      showLoader('กำลังโหลดการ์ด...');
      const cards = await api(`get-memory-cards?quiz_set_id=${quizSet.id}`);
      if (!cards || !cards.length) {
        toast('ยังไม่มีการ์ดในเกมนี้', 'warning'); renderHome(); return;
      }
      // แต่ละ card ใน DB = 1 คู่ (front+back) → สร้าง 2 การ์ดต่อ 1 record
      const pairs = cards.flatMap((c, i) => [
        { ...c, side: 'front', uid: `${c.id}-f` },
        { ...c, side: 'back', uid: `${c.id}-b` },
      ]);
      // กำหนดจำนวนคู่ตามขนาดหน้าจอ
      const vw = window.innerWidth;
      const maxPairs = vw < 400 ? 6 : vw < 600 ? 8 : vw < 900 ? 10 : 12;
      const usedPairs = pairs.slice(0, maxPairs * 2);
      MEM_CARDS = shuffle(usedPairs);
      MEM_FLIPPED = []; MEM_MATCHED = new Set(); MEM_LOCKED = false;
      MEM_MOVES = 0; MEM_START = Date.now();

      // ดึง leaderboard
      const lb = await getLB(quizSet.id, 10);
      renderMemoryBoard(quizSet, lb);
      memSubLB(quizSet.id);
    }

    function renderMemoryBoard(quizSet, lb = []) {
      const cols = window.innerWidth < 500 ? 3 : window.innerWidth < 700 ? 4 : 5;
      setApp(`
  <nav class="sticky top-0 z-40 glass border-b border-white/10 px-4 py-3">
    <div class="flex items-center gap-3 max-w-2xl mx-auto">
      <button onclick="memCleanup();renderHome()" class="p-2 rounded-xl hover:bg-white/10 transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      </button>
      <h1 class="font-bold font-kanit text-sm flex-1 truncate">🧠 ${esc(quizSet.title)}</h1>
      <div class="flex items-center gap-3 text-xs text-white/60">
        <span id="mem-moves">0 ครั้ง</span>
        <span id="mem-time" class="font-mono font-bold">0:00</span>
      </div>
    </div>
  </nav>
  <div class="max-w-2xl mx-auto px-3 py-4">
    <!-- Grid การ์ด -->
    <div id="mem-grid" style="display:grid;grid-template-columns:repeat(${cols},1fr);gap:8px;"></div>
    <!-- Leaderboard -->
    <div class="mt-5 glass rounded-2xl border border-white/10 overflow-hidden">
      <div class="flex items-center justify-between px-4 py-2.5 border-b border-white/10">
        <h3 class="font-bold text-sm font-kanit">🏆 อันดับเร็วสุด</h3>
        <div class="flex items-center gap-1"><div class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></div><span class="text-xs text-white/40">Live</span></div>
      </div>
      <div id="mem-lb" class="p-3 space-y-1.5 max-h-52 overflow-y-auto">${renderMemLBHtml(lb)}</div>
    </div>
  </div>`);

      renderMemGrid();
      memStartTimer();
    }

    function renderMemGrid() {
      const grid = document.getElementById('mem-grid');
      if (!grid) return;
      grid.innerHTML = MEM_CARDS.map((c, i) => `
  <div class="mem-card" id="mc-${i}" onclick="memFlip(${i})"
    style="aspect-ratio:1;perspective:600px;cursor:pointer;border-radius:12px;overflow:hidden;">
    <div class="mem-inner" id="mi-${i}" style="
      position:relative;width:100%;height:100%;transition:transform .45s;
      transform-style:preserve-3d;">
      <!-- Back (ด้านที่มองเห็นตอนแรก = ปกคลุม) -->
      <div style="position:absolute;inset:0;backface-visibility:hidden;border-radius:12px;
        background:linear-gradient(135deg,#4c1d95,#1e1b4b);
        display:flex;align-items:center;justify-content:center;border:2px solid rgba(124,58,237,.4);">
        <span style="font-size:1.8rem">🧠</span>
      </div>
      <!-- Front (ด้านที่เห็นหลังพลิก) -->
      <div style="position:absolute;inset:0;backface-visibility:hidden;transform:rotateY(180deg);border-radius:12px;overflow:hidden;">
        <img src="${esc(c.side === 'front' ? c.front_image_url : c.back_image_url || c.front_image_url)}"
          style="width:100%;height:100%;object-fit:cover;"
          onerror="this.parentElement.innerHTML='<div style=background:#1e1b4b;height:100%;display:flex;align-items:center;justify-content:center;font-size:2rem>🖼</div>'"
          alt="card" crossorigin="anonymous"/>
      </div>
    </div>
  </div>`).join('');
    }

    function memFlip(idx) {
      if (MEM_LOCKED) return;
      if (MEM_MATCHED.has(idx)) return;
      if (MEM_FLIPPED.includes(idx)) return;

      // พลิกการ์ด
      const inner = document.getElementById(`mi-${idx}`);
      if (inner) inner.style.transform = 'rotateY(180deg)';
      MEM_FLIPPED.push(idx);

      const card = MEM_CARDS[idx];

      // แสดง description ของใบแรก
      if (MEM_FLIPPED.length === 1 && card.description) {
        showMemDesc(card.description);
      }

      if (MEM_FLIPPED.length === 2) {
        MEM_LOCKED = true;
        MEM_MOVES++;
        const el = document.getElementById('mem-moves');
        if (el) el.textContent = `${MEM_MOVES} ครั้ง`;

        const [a, b] = MEM_FLIPPED;
        const ca = MEM_CARDS[a], cb = MEM_CARDS[b];

        if (ca.match_group === cb.match_group && a !== b) {
          // ✅ จับคู่ได้
          playMemSound(ca.sound_url || cb.sound_url);
          setTimeout(() => {
            ['mc-' + a, 'mc-' + b].forEach(id => {
              const el = document.getElementById(id);
              if (el) {
                el.style.transition = 'transform .3s, opacity .4s';
                el.style.transform = 'scale(1.1)';
                el.style.opacity = '0.3';
                setTimeout(() => { if (el) el.style.opacity = '0'; el.style.pointerEvents = 'none'; }, 400);
              }
            });
            MEM_MATCHED.add(a); MEM_MATCHED.add(b);
            MEM_FLIPPED = []; MEM_LOCKED = false;
            hideMemDesc();
            if (MEM_MATCHED.size === MEM_CARDS.length) memFinish();
          }, 600);
        } else {
          // ❌ ไม่ตรง — พลิกกลับ
          setTimeout(() => {
            [a, b].forEach(i => {
              const inner = document.getElementById(`mi-${i}`);
              if (inner) inner.style.transform = '';
            });
            MEM_FLIPPED = []; MEM_LOCKED = false;
            hideMemDesc();
          }, 1000);
        }
      }
    }

    function showMemDesc(text) {
      let el = document.getElementById('mem-desc');
      if (!el) {
        el = document.createElement('div');
        el.id = 'mem-desc';
        el.style.cssText = `
      position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
      background:rgba(15,15,26,.95);border:1px solid rgba(124,58,237,.5);
      border-radius:16px;padding:12px 20px;max-width:320px;width:90%;
      color:#f1f5f9;font-size:14px;font-family:'Sarabun',sans-serif;
      z-index:200;text-align:center;backdrop-filter:blur(12px);
      box-shadow:0 8px 32px rgba(0,0,0,.5);animation:slideUp .3s ease;`;
        document.body.appendChild(el);
      }
      el.textContent = text;
    }
    function hideMemDesc() {
      document.getElementById('mem-desc')?.remove();
    }

    function playMemSound(url) {
      if (!url) {
        // เสียง default ด้วย Web Audio API
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const o = ctx.createOscillator();
          const g = ctx.createGain();
          o.connect(g); g.connect(ctx.destination);
          o.frequency.setValueAtTime(520, ctx.currentTime);
          o.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + .15);
          g.gain.setValueAtTime(.4, ctx.currentTime);
          g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + .4);
          o.start(); o.stop(ctx.currentTime + .4);
        } catch (e) { }
        return;
      }
      try { new Audio(url).play(); } catch (e) { }
    }

    function memStartTimer() {
      clearInterval(MEM_TIMER);
      MEM_TIMER = setInterval(() => {
        const el = document.getElementById('mem-time');
        if (!el) { clearInterval(MEM_TIMER); return; }
        const s = Math.floor((Date.now() - MEM_START) / 1000);
        el.textContent = `${Math.floor(s / 60)}:${(s % 60).toString().padStart(2, '0')}`;
      }, 500);
    }

    async function memFinish() {
      clearInterval(MEM_TIMER);
      hideMemDesc();
      const timeSpent = Math.floor((Date.now() - MEM_START) / 1000);
      const m = Math.floor(timeSpent / 60), s = timeSpent % 60;
      confetti();

      // บันทึก leaderboard (เวลาน้อยกว่า = ดีกว่า → ใช้ score = -timeSpent)
      if (QUIZ_SET && USER) {
        const { data: existing } = await sb.from('quiz_leaderboard')
          .select('time_spent_seconds').eq('user_id', USER.userId).eq('quiz_set_id', QUIZ_SET.id).maybeSingle();
        const isBetter = !existing || timeSpent < existing.time_spent_seconds;
        if (isBetter) {
          await sb.from('quiz_leaderboard').upsert({
            user_id: USER.userId, quiz_set_id: QUIZ_SET.id, session_id: null,
            display_name: STUDENT?.full_name || USER.displayName,
            picture_url: USER.pictureUrl || null,
            score: MEM_MOVES,            // จำนวนครั้งที่พลิก (น้อยกว่า = ดีกว่า)
            percentage: 100,
            time_spent_seconds: timeSpent,
            achieved_at: new Date().toISOString(),
          }, { onConflict: 'user_id,quiz_set_id' });
        }
      }

      toast(`🎉 เล่นจบแล้ว! ${m}:${s.toString().padStart(2, '0')} น. | ${MEM_MOVES} ครั้ง`, 'success', 5000);

      // Modal ผล
      const modal = document.createElement('div');
      modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px;';
      modal.innerHTML = `
  <div style="background:#12121e;border:1px solid rgba(124,58,237,.3);border-radius:24px;padding:28px;max-width:320px;width:100%;text-align:center;animation:bounceIn .5s ease">
    <div style="font-size:4rem;margin-bottom:12px">🎉</div>
    <h2 style="font-family:'Kanit',sans-serif;font-size:1.4rem;font-weight:700;color:#a78bfa;margin-bottom:4px">เล่นจบแล้ว!</h2>
    <p style="color:rgba(255,255,255,.5);font-size:.85rem;margin-bottom:20px">${esc(QUIZ_SET?.title || '')}</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px">
      <div style="background:rgba(255,255,255,.06);border-radius:12px;padding:14px">
        <div style="color:rgba(255,255,255,.4);font-size:.7rem">เวลา</div>
        <div style="font-weight:700;font-size:1.2rem">${m}:${s.toString().padStart(2, '0')}</div>
      </div>
      <div style="background:rgba(255,255,255,.06);border-radius:12px;padding:14px">
        <div style="color:rgba(255,255,255,.4);font-size:.7rem">จำนวนครั้ง</div>
        <div style="font-weight:700;font-size:1.2rem">${MEM_MOVES}</div>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <button onclick="this.closest('[style*=fixed]').remove();openQuiz('${QUIZ_SET?.id}')"
        style="padding:14px;border-radius:14px;background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;font-weight:700;font-size:.9rem;border:none;cursor:pointer">
        🔄 เล่นอีกครั้ง
      </button>
      <button onclick="this.closest('[style*=fixed]').remove();memCleanup();renderHome()"
        style="padding:14px;border-radius:14px;background:rgba(255,255,255,.08);color:rgba(255,255,255,.8);font-weight:600;font-size:.9rem;border:none;cursor:pointer">
        🏠 กลับหน้าหลัก
      </button>
    </div>
  </div>`;
      document.body.appendChild(modal);
    }

    function memSubLB(quizSetId) {
      if (MEM_LB_CHAN) { sb.removeChannel(MEM_LB_CHAN); MEM_LB_CHAN = null; }
      MEM_LB_CHAN = sb.channel(`mem-lb:${quizSetId}`)
        .on('postgres_changes', { event: '*', schema: 'public', table: 'quiz_leaderboard', filter: `quiz_set_id=eq.${quizSetId}` },
          async () => {
            const lb = await getLB(quizSetId, 10);
            const el = document.getElementById('mem-lb');
            if (el) el.innerHTML = renderMemLBHtml(lb);
          })
        .subscribe();

    const MEM_MEDALS = ['🥇', '🥈', '🥉'];
    function renderMemLBHtml(entries) {
      if (!entries.length) return `<div class="text-center py-6 text-white/40 text-sm">ยังไม่มีผู้เล่น</div>`;

        const isMe = e.user_id === USER?.userId;
        const av = e.picture_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(e.display_name)}&background=6366f1&color=fff`;
        const m = Math.floor(e.time_spent_seconds / 60), s = e.time_spent_seconds % 60;
        return `<div class="flex items-center gap-2.5 p-2 rounded-xl border ${isMe ? 'border-purple-500 bg-purple-500/10' : 'border-white/8 bg-white/4'}">
      <div class="w-6 text-center text-sm">${i < 3 ? MEM_MEDALS[i] : `<span class="text-xs text-white/40">#${i + 1}</span>`}</div>
      <img src="${av}" class="w-8 h-8 rounded-full object-cover border ${isMe ? 'border-purple-400' : 'border-white/20'}" onerror="this.src='https://ui-avatars.com/api/?name=U&background=6366f1&color=fff'" alt=""/>
      <div class="flex-1 min-w-0">
        <p class="text-xs font-semibold truncate ${isMe ? 'text-purple-200' : ''}">${esc(e.display_name)}${isMe ? ' (คุณ)' : ''}</p>

        <div class="font-bold ${i === 0 ? 'text-yellow-400' : ''}">${m}:${s.toString().padStart(2, '0')}</div>
