      </div>
    </div>`;
      }).join('');
    }

    // ══════════════════════════════════════════════════════════════
    // ADMIN — ตั้งค่าการ์ดเกมความจำ
    // ══════════════════════════════════════════════════════════════
    async function openMemorySettings(quizSetId, title) {
      showLoader('กำลังโหลดการ์ด...');
      const existing = await api(`get-memory-cards?quiz_set_id=${quizSetId}`);

      // เตรียม rows (อย่างน้อย 6 แถว)
      const initRows = existing.length ? existing : Array(6).fill(null).map((_, i) => ({ front_image_url: '', back_image_url: '', description: '', sound_url: '', match_group: String(i) }));

      const renderRows = (rows) => rows.map((r, i) => `
  <tr id="mrow-${i}">
    <td class="text-center text-xs text-white/40 pr-2">${i + 1}</td>
    <td><input type="text" class="form-inp text-xs py-1.5" placeholder="https://..." value="${esc(r.front_image_url || '')}"
      oninput="memRowData[${i}].front_image_url=this.value" style="min-width:120px"/></td>
    <td><input type="text" class="form-inp text-xs py-1.5" placeholder="https://... (ว่าง=ใช้ด้านหน้า)" value="${esc(r.back_image_url || '')}"
      oninput="memRowData[${i}].back_image_url=this.value" style="min-width:120px"/></td>
    <td><input type="text" class="form-inp text-xs py-1.5" placeholder="คำอธิบาย..." value="${esc(r.description || '')}"
      oninput="memRowData[${i}].description=this.value" style="min-width:100px"/></td>
    <td><input type="text" class="form-inp text-xs py-1.5" placeholder="https://sound.mp3" value="${esc(r.sound_url || '')}"
      oninput="memRowData[${i}].sound_url=this.value" style="min-width:100px"/></td>
    <td><button onclick="memDelRow(${i})" class="text-xs px-2 py-1.5 rounded-lg bg-red-500/20 hover:bg-red-500/40 transition">✕</button></td>
  </tr>`).join('');

      // global state for rows
      window.memRowData = initRows.map(r => ({ ...r }));

      setApp(`
  <nav class="sticky top-0 z-40 glass border-b border-white/10 px-4 py-3">
    <div class="flex items-center gap-3 max-w-5xl mx-auto">
      <button onclick="admQuizSets()" class="p-2 rounded-xl hover:bg-white/10 transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      </button>
      <div class="flex-1">
        <h1 class="font-bold font-kanit text-sm">🧠 ตั้งค่าการ์ด — ${esc(title)}</h1>
        <p class="text-xs text-white/40">แต่ละแถว = 1 คู่การ์ด (ด้านหน้า + ด้านหลัง)</p>
      </div>
      <button onclick="memSaveCards('${quizSetId}')" class="btn-grad px-4 py-2 rounded-xl text-sm font-bold shadow">💾 บันทึก</button>
    </div>
  </nav>

  <div class="max-w-5xl mx-auto px-4 py-5">
    <div class="stat-card overflow-hidden p-0 mb-4">
      <div class="overflow-x-auto">
        <table class="tbl" style="min-width:700px">
          <thead><tr>
            <th style="width:32px">#</th>
            <th>ภาพด้านหน้า (URL) <span class="text-white/30 font-normal">*</span></th>
            <th>ภาพด้านหลัง (URL)</th>
            <th>คำอธิบายภาพ</th>
            <th>เสียง effect (URL)</th>
            <th style="width:40px"></th>
          </tr></thead>
          <tbody id="mem-rows">${renderRows(window.memRowData)}</tbody>
        </table>
      </div>
    </div>

    <div class="flex gap-3 mb-5">
      <button onclick="memAddRow()" class="px-4 py-2 rounded-xl border border-white/20 hover:bg-white/10 transition text-sm text-white/70">
        + เพิ่มคู่การ์ด
      </button>
      <span class="text-xs text-white/40 self-center">รองรับภาพจาก lh3.googleusercontent.com หรือที่อื่นๆ</span>
    </div>

    <!-- Preview -->
    <div class="stat-card">
      <h3 class="font-bold text-sm mb-3">🖼 Preview การ์ด (ด้านหน้า)</h3>
      <div class="flex flex-wrap gap-3" id="mem-preview">
        ${window.memRowData.filter(r => r.front_image_url).map(r => `
        <div style="width:80px;height:80px;border-radius:10px;overflow:hidden;background:#1e1b4b;flex-shrink:0">
          <img src="${esc(r.front_image_url)}" style="width:100%;height:100%;object-fit:cover"
            onerror="this.parentElement.innerHTML='❌'" crossorigin="anonymous" alt=""/>
        </div>`).join('') || '<p class="text-white/30 text-xs">ยังไม่มีภาพ</p>'}
      </div>
    </div>
  </div>`);
    }

    window.memAddRow = function () {
      const i = window.memRowData.length;
      window.memRowData.push({ front_image_url: '', back_image_url: '', description: '', sound_url: '', match_group: String(i) });
      const tbody = document.getElementById('mem-rows');
      if (!tbody) return;
      const tr = document.createElement('tr');
      tr.id = `mrow-${i}`;
      tr.innerHTML = `
    <td class="text-center text-xs text-white/40 pr-2">${i + 1}</td>
    <td><input type="text" class="form-inp text-xs py-1.5" placeholder="https://..." oninput="memRowData[${i}].front_image_url=this.value" style="min-width:120px"/></td>
    <td><input type="text" class="form-inp text-xs py-1.5" placeholder="https://..." oninput="memRowData[${i}].back_image_url=this.value" style="min-width:120px"/></td>
    <td><input type="text" class="form-inp text-xs py-1.5" placeholder="คำอธิบาย..." oninput="memRowData[${i}].description=this.value" style="min-width:100px"/></td>
    <td><input type="text" class="form-inp text-xs py-1.5" placeholder="https://sound.mp3" oninput="memRowData[${i}].sound_url=this.value" style="min-width:100px"/></td>
    <td><button onclick="memDelRow(${i})" class="text-xs px-2 py-1.5 rounded-lg bg-red-500/20 hover:bg-red-500/40 transition">✕</button></td>`;
      tbody.appendChild(tr);
    };

    window.memDelRow = function (i) {
      window.memRowData.splice(i, 1);
      document.getElementById(`mrow-${i}`)?.remove();
      // re-number
      document.querySelectorAll('#mem-rows tr').forEach((tr, idx) => {
        tr.id = `mrow-${idx}`;
        const td = tr.querySelector('td:first-child');
        if (td) td.textContent = idx + 1;
      });
    };

    async function memSaveCards(quizSetId) {
      const cards = window.memRowData.filter(r => r.front_image_url?.trim());
      if (cards.length < 2) { toast('กรุณาเพิ่มการ์ดอย่างน้อย 2 คู่', 'warning'); return; }
      const payload = cards.map((c, i) => ({ ...c, match_group: String(i), order_index: i }));
      const res = await api('save-memory-cards', { method: 'POST', body: JSON.stringify({ quizSetId, cards: payload }) });
      if (res.ok) { toast(`บันทึก ${res.saved} คู่การ์ดแล้ว`, 'success'); admQuizSets(); }
      else toast('บันทึกไม่สำเร็จ: ' + (res.error || ''), 'error');
    }

    // ══════════════════════════════════════════════════════════════
    // MATCH GAME — เกมจับคู่ (ลากหรือแตะเชื่อมภาพซ้าย-ขวา)
    // ══════════════════════════════════════════════════════════════
    let MATCH_CARDS = [], MATCH_PAIRS = [], MATCH_SEL = null;
    let MATCH_DONE = new Set(), MATCH_START = 0, MATCH_TIMER = null;
    let MATCH_MOVES = 0, MATCH_LB_CHAN = null;

    async function openMatchGame(quizSet) {
      showLoader('กำลังโหลดเกมจับคู่...');
      const cards = await api(`get-memory-cards?quiz_set_id=${quizSet.id}`);
      if (!cards || !cards.length) {
        toast('ยังไม่มีการ์ดในเกมนี้', 'warning'); renderHome(); return;
      }
      // จำกัดจำนวนคู่ตามหน้าจอ
      const vw = window.innerWidth;
      const maxPairs = vw < 400 ? 4 : vw < 600 ? 5 : vw < 900 ? 6 : 8;
      const used = cards.slice(0, maxPairs);

      // สร้าง left (front) และ right (back/front) แล้ว shuffle แต่ละฝั่งแยกกัน
      MATCH_PAIRS = used;
      const lefts = shuffle(used.map((c, i) => ({ ...c, side: 'left', uid: `l${i}`, pairIdx: i })));
      const rights = shuffle(used.map((c, i) => ({ ...c, side: 'right', uid: `r${i}`, pairIdx: i })));
      MATCH_CARDS = { lefts, rights };
      MATCH_SEL = null; MATCH_DONE = new Set(); MATCH_MOVES = 0;
      MATCH_START = Date.now();

      const lb = await getLB(quizSet.id, 10);
      renderMatchBoard(quizSet, lb);
      matchSubLB(quizSet.id);
    }

    function renderMatchBoard(quizSet, lb = []) {
      setApp(`
  <nav class="sticky top-0 z-40 glass border-b border-white/10 px-4 py-3">
    <div class="flex items-center gap-3 max-w-2xl mx-auto">
      <button onclick="matchCleanup();renderHome()" class="p-2 rounded-xl hover:bg-white/10 transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      </button>
      <h1 class="font-bold font-kanit text-sm flex-1 truncate">🃏 ${esc(quizSet.title)}</h1>
      <div class="flex items-center gap-3 text-xs text-white/60">
        <span id="match-moves">0 ครั้ง</span>
        <span id="match-time" class="font-mono font-bold text-white">0:00</span>
      </div>
    </div>
  </nav>
  <div class="max-w-2xl mx-auto px-3 py-4">
    <p class="text-center text-xs text-white/40 mb-3">แตะภาพซ้ายแล้วแตะภาพขวาที่คู่กัน</p>
    <div id="match-grid" class="grid gap-3" style="grid-template-columns:1fr 1fr"></div>
    <!-- Leaderboard -->
    <div class="mt-5 glass rounded-2xl border border-white/10 overflow-hidden">
      <div class="flex items-center justify-between px-4 py-2.5 border-b border-white/10">
        <h3 class="font-bold text-sm font-kanit">🏆 อันดับเร็วสุด</h3>
        <div class="flex items-center gap-1"><div class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></div><span class="text-xs text-white/40">Live</span></div>
      </div>
      <div id="match-lb" class="p-3 space-y-1.5 max-h-48 overflow-y-auto">${renderMemLBHtml(lb)}</div>
    </div>
  </div>`);

      renderMatchGrid();
      matchStartTimer();
    }

    function renderMatchGrid() {
      const grid = document.getElementById('match-grid');
      if (!grid) return;
      const { lefts, rights } = MATCH_CARDS;
      const n = lefts.length;

      // สร้างแถว n แถว x 2 คอลัมน์ (ซ้าย | ขวา)
      grid.innerHTML = Array.from({ length: n }, (_, i) => {
        const L = lefts[i], R = rights[i];
        return `
    <div class="flex gap-3">
      ${matchCardHTML(L)}
      ${matchCardHTML(R)}
    </div>`;
      }).join('');
    }

    function matchCardHTML(c) {
      const isDone = MATCH_DONE.has(c.pairIdx);
      const imgUrl = c.side === 'left'
        ? c.front_image_url
        : (c.back_image_url || c.front_image_url);
      return `
  <div id="mc-${c.uid}" onclick="matchTap('${c.uid}','${c.pairIdx}','${c.side}')"
    class="match-card flex-1 rounded-2xl overflow-hidden cursor-pointer transition-all duration-200"
    style="aspect-ratio:1;border:2px solid ${isDone ? 'transparent' : 'rgba(255,255,255,0.12)'};
      opacity:${isDone ? '0.25' : '1'};pointer-events:${isDone ? 'none' : 'auto'};
      background:#0f0f1a;position:relative;">
    <img src="${esc(imgUrl)}" style="width:100%;height:100%;object-fit:cover;display:block"
      onerror="this.parentElement.style.background='#1e1b4b';this.style.display='none'"
      crossorigin="anonymous" alt=""/>
    ${c.description && c.side === 'left' ? `
    <div style="position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.7));
      padding:6px 8px;font-size:10px;color:#fff;line-height:1.2">${esc(c.description)}</div>` : ''}
  </div>`;
    }

    function matchTap(uid, pairIdxStr, side) {
      const pairIdx = parseInt(pairIdxStr);
      if (MATCH_DONE.has(pairIdx)) return;

      const el = document.getElementById(`mc-${uid}`);

      if (!MATCH_SEL) {
        // ── เลือกใบแรก ──
        MATCH_SEL = { uid, pairIdx, side };
        if (el) {
          el.style.border = '2px solid #7c3aed';
          el.style.transform = 'scale(1.05)';
          el.style.boxShadow = '0 0 16px rgba(124,58,237,.6)';
        }
        return;
      }

      // ── กดซ้ำใบเดิม → ยกเลิก ──
      if (MATCH_SEL.uid === uid) {
        matchDeselect(MATCH_SEL.uid);
        MATCH_SEL = null;
        return;
      }

      // ── กดฝั่งเดียวกัน → สลับ selection ──
      if (MATCH_SEL.side === side) {
        matchDeselect(MATCH_SEL.uid);
        MATCH_SEL = { uid, pairIdx, side };
        if (el) {
          el.style.border = '2px solid #7c3aed';
          el.style.transform = 'scale(1.05)';
          el.style.boxShadow = '0 0 16px rgba(124,58,237,.6)';
        }
        return;
      }

      // ── เลือกใบที่สอง (ต่างฝั่ง) → ตรวจ ──
      MATCH_MOVES++;
      const movEl = document.getElementById('match-moves');
      if (movEl) movEl.textContent = `${MATCH_MOVES} ครั้ง`;

      if (MATCH_SEL.pairIdx === pairIdx) {
        // ✅ จับคู่ถูก
        matchDeselect(MATCH_SEL.uid);
        playMemSound(MATCH_PAIRS[pairIdx]?.sound_url || null);
        MATCH_DONE.add(pairIdx);

        // flash สีเขียวแล้วจาง
        [MATCH_SEL.uid, uid].forEach(id => {
          const e = document.getElementById(`mc-${id}`);
          if (e) {
            e.style.border = '2px solid #22c55e';
            e.style.transform = 'scale(1.05)';
            e.style.boxShadow = '0 0 20px rgba(34,197,94,.5)';
            setTimeout(() => {
              e.style.opacity = '0.2';
              e.style.pointerEvents = 'none';
              e.style.transform = '';
              e.style.boxShadow = '';
            }, 500);
          }
        });
        MATCH_SEL = null;

        // เสร็จแล้ว?
        if (MATCH_DONE.size === MATCH_PAIRS.length) {
          setTimeout(matchFinish, 700);
        }
      } else {
        // ❌ ไม่ตรง — flash แดงแล้วรีเซ็ต
        [MATCH_SEL.uid, uid].forEach(id => {
          const e = document.getElementById(`mc-${id}`);
          if (e) {
            e.style.border = '2px solid #ef4444';
            e.style.boxShadow = '0 0 16px rgba(239,68,68,.4)';
          }
        });
        const prevSel = MATCH_SEL;
        MATCH_SEL = null;
        setTimeout(() => {
          matchDeselect(prevSel.uid);
          matchDeselect(uid);
        }, 700);
      }
    }

    function matchDeselect(uid) {
      const e = document.getElementById(`mc-${uid}`);
      if (e) {
        e.style.border = '2px solid rgba(255,255,255,0.12)';
        e.style.transform = '';
        e.style.boxShadow = '';
      }
    }

    function matchStartTimer() {
      clearInterval(MATCH_TIMER);
      MATCH_TIMER = setInterval(() => {
        const el = document.getElementById('match-time');
        if (!el) { clearInterval(MATCH_TIMER); return; }
        const s = Math.floor((Date.now() - MATCH_START) / 1000);
        el.textContent = `${Math.floor(s / 60)}:${(s % 60).toString().padStart(2, '0')}`;
      }, 500);
    }

    async function matchFinish() {
      clearInterval(MATCH_TIMER);
      const timeSpent = Math.floor((Date.now() - MATCH_START) / 1000);
      const m = Math.floor(timeSpent / 60), s = timeSpent % 60;
      confetti();

      // บันทึก leaderboard
      if (QUIZ_SET && USER) {
        const { data: existing } = await sb.from('quiz_leaderboard')
          .select('time_spent_seconds').eq('user_id', USER.userId).eq('quiz_set_id', QUIZ_SET.id).maybeSingle();
        const isBetter = !existing || timeSpent < existing.time_spent_seconds;
        if (isBetter) {
          await sb.from('quiz_leaderboard').upsert({
            user_id: USER.userId, quiz_set_id: QUIZ_SET.id, session_id: null,
            display_name: STUDENT?.full_name || USER.displayName,
            picture_url: USER.pictureUrl || null,
            score: MATCH_MOVES,
            percentage: 100,
            time_spent_seconds: timeSpent,
            achieved_at: new Date().toISOString(),
          }, { onConflict: 'user_id,quiz_set_id' });
        }
      }

      toast(`🎉 จับคู่ครบ! ${m}:${s.toString().padStart(2, '0')} | ${MATCH_MOVES} ครั้ง`, 'success', 5000);

      const modal = document.createElement('div');
      modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px;';
      modal.innerHTML = `
  <div style="background:#12121e;border:1px solid rgba(124,58,237,.3);border-radius:24px;padding:28px;max-width:300px;width:100%;text-align:center;animation:bounceIn .5s ease">
    <div style="font-size:3.5rem;margin-bottom:10px">🎉</div>
    <h2 style="font-family:'Kanit',sans-serif;font-size:1.3rem;font-weight:700;color:#a78bfa;margin-bottom:4px">จับคู่ครบแล้ว!</h2>
    <p style="color:rgba(255,255,255,.5);font-size:.8rem;margin-bottom:18px">${esc(QUIZ_SET?.title || '')}</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px">
      <div style="background:rgba(255,255,255,.06);border-radius:10px;padding:12px">
        <div style="color:rgba(255,255,255,.4);font-size:.65rem">เวลา</div>
        <div style="font-weight:700;font-size:1.1rem">${m}:${s.toString().padStart(2, '0')}</div>
      </div>
      <div style="background:rgba(255,255,255,.06);border-radius:10px;padding:12px">
        <div style="color:rgba(255,255,255,.4);font-size:.65rem">จำนวนครั้ง</div>
        <div style="font-weight:700;font-size:1.1rem">${MATCH_MOVES}</div>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px">
      <button onclick="this.closest('[style*=fixed]').remove();openQuiz('${QUIZ_SET?.id}')"
        style="padding:13px;border-radius:14px;background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;font-weight:700;font-size:.9rem;border:none;cursor:pointer">
        🔄 เล่นอีกครั้ง
      </button>
      <button onclick="this.closest('[style*=fixed]').remove();matchCleanup();renderHome()"
        style="padding:13px;border-radius:14px;background:rgba(255,255,255,.08);color:rgba(255,255,255,.8);font-weight:600;font-size:.9rem;border:none;cursor:pointer">
        🏠 กลับหน้าหลัก
      </button>
    </div>
  </div>`;
      document.body.appendChild(modal);
    }

    function matchSubLB(quizSetId) {
      if (MATCH_LB_CHAN) { sb.removeChannel(MATCH_LB_CHAN); MATCH_LB_CHAN = null; }
      MATCH_LB_CHAN = sb.channel(`match-lb:${quizSetId}`)
        .on('postgres_changes', { event: '*', schema: 'public', table: 'quiz_leaderboard', filter: `quiz_set_id=eq.${quizSetId}` },
          async () => {
            const lb = await getLB(quizSetId, 10);
            const el = document.getElementById('match-lb');
            if (el) el.innerHTML = renderMemLBHtml(lb);
          })
        .subscribe();
    }

    function matchCleanup() {
      clearInterval(MATCH_TIMER);
      if (MATCH_LB_CHAN) { sb.removeChannel(MATCH_LB_CHAN); MATCH_LB_CHAN = null; }
    }

    // ══════════════════════════════════════════════════════════════
    // WHEEL SPIN GAME — เกมหมุนวงล้อสุ่ม
    // ══════════════════════════════════════════════════════════════
    let WHEEL_ITEMS = [], WHEEL_SPINNING = false, WHEEL_RESULT = null;
    let WHEEL_ARC = 0, WHEEL_RAF = null;

    function drawWheel(startAngle) {
      const canvas = document.getElementById('wheel-canvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');
      const W = canvas.width, H = canvas.height;
      const cx = W / 2, cy = H / 2, r = cx - 6;

      ctx.clearRect(0, 0, W, H);

      // expand items by weight for probability
      const expanded = [];
      WHEEL_ITEMS.forEach(it => {
        const w = Math.max(1, parseInt(it.weight) || 1);
        for (let i = 0; i < w; i++) expanded.push(it);
      });
      const n = expanded.length;
      const slice = (Math.PI * 2) / n;

      expanded.forEach((it, i) => {
        const a1 = startAngle + i * slice;
        const a2 = a1 + slice;

        // sector
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, r, a1, a2);
        ctx.closePath();
        ctx.fillStyle = it.color || '#7c3aed';
        ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,.25)';
        ctx.lineWidth = 2;
        ctx.stroke();

        // text
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(a1 + slice / 2);
        ctx.textAlign = 'right';
        ctx.fillStyle = '#fff';
        ctx.font = `bold ${n > 12 ? 11 : 13}px Sarabun, sans-serif`;
        ctx.shadowColor = 'rgba(0,0,0,.6)';
        ctx.shadowBlur = 3;
        const maxLen = n > 12 ? 10 : 14;
        const label = it.label.length > maxLen ? it.label.slice(0, maxLen - 1) + '…' : it.label;
        ctx.fillText(label, r - 10, 5);
        ctx.restore();
      });

      // center circle
      ctx.beginPath();
      ctx.arc(cx, cy, 22, 0, Math.PI * 2);
      ctx.fillStyle = '#0a0a14';
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,.2)';
      ctx.lineWidth = 3;
      ctx.stroke();

      ctx.fillStyle = '#fff';
      ctx.font = 'bold 18px Sarabun';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('🎡', cx, cy);
    }

    function spinWheel() {
      if (WHEEL_SPINNING) return;
      WHEEL_SPINNING = true;

      // ซ่อนผลที่พบครั้งก่อน
      const ra = document.getElementById('wheel-result-area');
      if (ra) { ra.style.display = 'none'; ra.innerHTML = ''; }

      const btn = document.getElementById('wheel-spin-btn');
      if (btn) btn.disabled = true;

      // สร้าง expanded items (คำนึงถึง weight)
      const expanded = [];
      WHEEL_ITEMS.forEach(it => {
        const w = Math.max(1, parseInt(it.weight) || 1);
        for (let i = 0; i < w; i++) expanded.push(it);
      });
      const n = expanded.length;
      const slice = (Math.PI * 2) / n;

      // สุ่มผลลัพธ์
      const winIdx = Math.floor(Math.random() * n);
      WHEEL_RESULT = expanded[winIdx];

      // เล่นเสียงหมุน
      playWheelSpinSound();

      // แอนิเมชั่น: หมุนอย่างน้อย 5 รอบ + หยุดที่ winIdx
      const totalRota = Math.PI * 2 * (5 + Math.random() * 3);
      // มุมปลายที่ pointer (แนวบน = -PI/2) ชี้ที่ winIdx
      // pointer อยู่บนสุด → canvas หมุน angle = startAngle ที่ทำให้ winIdx sector กลางหน้า pointer
      const winAngle = -(winIdx * slice + slice / 2) - Math.PI / 2;
      const startA = WHEEL_ARC;
      const endA = winAngle - Math.floor((winAngle - startA) / (Math.PI * 2)) * (Math.PI * 2) + Math.PI * 2 * 5;

      const duration = 4000 + Math.random() * 1500;
      const t0 = performance.now();

      function easeOut(t) { return 1 - Math.pow(1 - t, 4); }

      function frame(now) {
        const elapsed = now - t0;
        const prog = Math.min(elapsed / duration, 1);
        const angle = startA + (endA - startA) * easeOut(prog);
        WHEEL_ARC = angle;
        drawWheel(angle);
        if (prog < 1) {
          WHEEL_RAF = requestAnimationFrame(frame);
        } else {
          WHEEL_SPINNING = false;
          if (btn) btn.disabled = false;
          showWheelResult(WHEEL_RESULT);
        }
      }
      WHEEL_RAF = requestAnimationFrame(frame);
    }

    function playWheelSpinSound() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const dur = 4;
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = 'sawtooth';
        o.frequency.setValueAtTime(120, ctx.currentTime);
        o.frequency.exponentialRampToValueAtTime(40, ctx.currentTime + dur);
        g.gain.setValueAtTime(.12, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + dur);
        o.start(); o.stop(ctx.currentTime + dur);
      } catch (e) { }
    }

    function playWheelWinSound() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        [523, 659, 784, 1047].forEach((f, i) => {
          const o = ctx.createOscillator();
          const g = ctx.createGain();
          o.connect(g); g.connect(ctx.destination);
          o.frequency.value = f;
          g.gain.setValueAtTime(.25, ctx.currentTime + i * .12);
          g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + i * .12 + .3);
          o.start(ctx.currentTime + i * .12);
          o.stop(ctx.currentTime + i * .12 + .3);
        });
      } catch (e) { }
    }

      document.body.insertAdjacentHTML('beforeend', `

    async function saveQuizSettings(id) {
      const timeMins = parseFloat(document.getElementById('qs-time')?.value || '0');
      const maxAttempts = parseInt(document.getElementById('qs-attempts')?.value || '0');
      const shuffleQ = document.getElementById('qs-shuffle-q')?.checked ?? false;
      const shuffleC = document.getElementById('qs-shuffle-c')?.checked ?? false;
      const showAnswer = document.getElementById('qs-showanswer')?.checked ?? false;

      // validate
      if (isNaN(timeMins) || timeMins < 0) { toast('เวลาต้องเป็นตัวเลข ≥ 0', 'warning'); return; }

      const timeSecs = Math.round(timeMins * 60);

      const { error } = await sb.from('quiz_sets').update({
        time_limit_seconds: timeSecs,
        max_attempts: maxAttempts,
        shuffle_questions: shuffleQ,
        shuffle_choices: shuffleC,
        show_answer_after: showAnswer,
        updated_at: new Date().toISOString(),
      }).eq('id', id);

      if (error) { toast('บันทึกไม่สำเร็จ: ' + error.message, 'error'); return; }

      document.getElementById('qs-modal')?.remove();
      toast('บันทึกการตั้งค่าแล้ว', 'success');
      admQuizSets(); // refresh ตาราง
    }

        <div class="flex gap-3 flex-wrap">

            💾 บันทึก &amp; Import
          </button>
          <button onclick="dlTemplate()" class="px-5 py-3 rounded-xl border border-white/20 hover:bg-white/10 transition text-sm text-white/70">
            ⬇ ดาวน์โหลด Template
          </button>
        </div>
      </div>
    </div>

    <!-- ── คำอธิบาย format ── -->
    <div class="stat-card">
      <h3 class="font-bold text-sm mb-3">📋 รูปแบบ CSV (header row)</h3>
      <div class="bg-black/30 rounded-xl p-3 font-mono text-xs text-green-400 overflow-x-auto mb-3">
        question_text,question_type,choice_a,choice_b,choice_c,choice_d,correct_answer,explanation,difficulty,points,image_url
      </div>
      <div class="space-y-1 text-xs text-white/50">
        <p>• <span class="text-white/70">question_type</span>: multiple_choice | fill_blank | true_false | drag_drop</p>
        <p>• <span class="text-white/70">correct_answer</span>: A/B/C/D สำหรับ multiple_choice | คำตอบตรงๆ สำหรับ fill_blank | true/false</p>
        <p>• <span class="text-white/70">difficulty</span>: easy | medium | hard</p>
        <p>• <span class="text-white/70">points</span>: คะแนนต่อข้อ (ค่าเริ่มต้น 1)</p>
      </div>
    </div>

    <div id="imp-result" class="mt-1"></div>
  </div>`;

      // state
      window._impMode = 'new';
      window._impExistingId = null;
    }

    function impSetMode(mode) {
      window._impMode = mode;
      window._impExistingId = null;
      const btnNew = document.getElementById('imp-mode-new');
      const btnEx  = document.getElementById('imp-mode-exists');
      const rowEx  = document.getElementById('imp-exists-row');
      if (mode === 'new') {
        btnNew.style.cssText = 'flex:1;padding:.625rem;border-radius:.75rem;font-size:.875rem;font-weight:600;background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff';
        btnEx.style.cssText  = 'flex:1;padding:.625rem;border-radius:.75rem;font-size:.875rem;font-weight:600;background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.6)';
        rowEx.style.display  = 'none';
        // clear form
        ['imp-title','imp-desc'].forEach(id => { const el = document.getElementById(id); if(el) el.value=''; });
        document.getElementById('imp-testtype').value = 'practice';
        document.getElementById('imp-quiztype').value = 'multiple_choice';
        document.getElementById('imp-pass').value = '60';
        document.getElementById('imp-time').value = '0';
        document.getElementById('imp-attempts').value = '0';
        document.getElementById('imp-published').checked = true;
      } else {
        btnEx.style.cssText  = 'flex:1;padding:.625rem;border-radius:.75rem;font-size:.875rem;font-weight:600;background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff';
        btnNew.style.cssText = 'flex:1;padding:.625rem;border-radius:.75rem;font-size:.875rem;font-weight:600;background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.6)';
        rowEx.style.display  = 'block';
      }
    }

    function impLoadExisting(id) {
      if (!id) { window._impExistingId = null; return; }
      window._impExistingId = id;
      const opt = document.querySelector(`#imp-qid option[value="${id}"]`);
      if (!opt) return;
      try {
        const q = JSON.parse(opt.dataset.obj);
        document.getElementById('imp-title').value   = q.title || '';
        document.getElementById('imp-desc').value    = q.description || '';
        document.getElementById('imp-testtype').value = q.test_type || 'practice';
        document.getElementById('imp-quiztype').value = q.quiz_type || 'multiple_choice';
        document.getElementById('imp-pass').value    = q.pass_score || 60;
        document.getElementById('imp-time').value    = q.time_limit_seconds > 0 ? q.time_limit_seconds / 60 : 0;
        document.getElementById('imp-attempts').value = q.max_attempts || 0;
      } catch(e) {}
    }

    async function doImport() {
      const title      = document.getElementById('imp-title').value.trim();
      const testType   = document.getElementById('imp-testtype').value;
      const quizType   = document.getElementById('imp-quiztype').value;
      const passScore  = parseFloat(document.getElementById('imp-pass').value) || 60;
      const timeMins   = parseFloat(document.getElementById('imp-time').value) || 0;
      const maxAttempts= parseInt(document.getElementById('imp-attempts').value) || 0;
      const shuffleQ   = document.getElementById('imp-shuffleq')?.checked ?? false;
      const shuffleC   = document.getElementById('imp-shufflec')?.checked ?? false;
      const showAnswer = document.getElementById('imp-showanswer')?.checked ?? false;
      const published  = document.getElementById('imp-published')?.checked ?? true;
      const unitId     = document.getElementById('imp-unit')?.value || null;
      const desc       = document.getElementById('imp-desc').value.trim();
      const file       = document.getElementById('imp-file').files[0];
      const r          = document.getElementById('imp-result');

      if (!title) { toast('กรุณาใส่ชื่อชุดแบบทดสอบ', 'warning'); return; }

      const mode = window._impMode || 'new';
      let quizSetId = window._impExistingId || null;

      r.innerHTML = `<div class="stat-card animate-pulse text-white/60 text-sm">กำลังบันทึกข้อมูล...</div>`;

      try {
        const payload = {
          title,
          description: desc || null,
          test_type: testType,
          quiz_type: quizType,
          pass_score: passScore,
          time_limit_seconds: Math.round(timeMins * 60),
          max_attempts: maxAttempts,
          shuffle_questions: shuffleQ,
          shuffle_choices: shuffleC,
          show_answer_after: showAnswer,
          is_published: published,
          unit_id: unitId || null,
          updated_at: new Date().toISOString(),
        };

        if (mode === 'new') {
          // สร้างชุดใหม่
          const { data: newSet, error: insErr } = await sb.from('quiz_sets').insert(payload).select('id').single();
          if (insErr) throw new Error('สร้างชุดไม่สำเร็จ: ' + insErr.message);
          quizSetId = newSet.id;
          toast('สร้างชุดแบบทดสอบใหม่แล้ว ✓', 'success');
        } else {
          // แก้ไขชุดที่มีอยู่
          if (!quizSetId) { toast('กรุณาเลือกชุดแบบทดสอบ', 'warning'); r.innerHTML=''; return; }
          const { error: updErr } = await sb.from('quiz_sets').update(payload).eq('id', quizSetId);
          if (updErr) throw new Error('อัปเดตไม่สำเร็จ: ' + updErr.message);
          toast('อัปเดตข้อมูลชุดแบบทดสอบแล้ว ✓', 'success');
        }

        // ถ้าไม่มีไฟล์ → จบแค่บันทึกข้อมูล
        if (!file) {
          r.innerHTML = `
            <div class="stat-card border border-green-500/30 bg-green-500/5">
              <p class="text-green-400 font-bold mb-1">✅ บันทึกข้อมูลสำเร็จ!</p>
              <p class="text-sm text-white/70">ชุดแบบทดสอบ "${esc(title)}" ${mode==='new'?'ถูกสร้างแล้ว':'ถูกอัปเดตแล้ว'}</p>
              <button onclick="admQuizSets()" class="mt-3 px-4 py-2 rounded-xl btn-grad text-sm font-semibold">
                → ไปที่ชุดแบบทดสอบ
              </button>
            </div>`;
          admQuizSets();
          return;
        }

        // มีไฟล์ → import คำถาม
        r.innerHTML = `<div class="stat-card animate-pulse text-white/60 text-sm">กำลัง import คำถาม...</div>`;
        const fd = new FormData();
        fd.append('file', file);
        fd.append('quiz_set_id', quizSetId);
        const res = await fetch(`${API_BASE}/import-questions`, { method: 'POST', body: fd });
        const d = await res.json();
        if (d.ok) {
          r.innerHTML = `
            <div class="stat-card border border-green-500/30 bg-green-500/5">
              <p class="text-green-400 font-bold mb-2">✅ Import สำเร็จ!</p>
              <p class="text-sm text-white/70 mb-1">ชุด: <span class="text-white font-semibold">${esc(title)}</span></p>
              <p class="text-sm text-white/70">นำเข้า <span class="text-green-300 font-bold">${d.imported}/${d.total}</span> รายการ</p>
              ${d.errors?.length ? `<div class="mt-3 text-xs text-red-400 space-y-0.5">${d.errors.map(e=>`<p>• ${esc(e)}</p>`).join('')}</div>` : ''}
              <button onclick="admQuizSets()" class="mt-3 px-4 py-2 rounded-xl btn-grad text-sm font-semibold">
                → ไปที่ชุดแบบทดสอบ
              </button>
            </div>`;
          toast(`Import สำเร็จ ${d.imported} ข้อ 🎉`, 'success');
          admQuizSets();
        } else {
          r.innerHTML = `<div class="stat-card border border-red-500/30"><p class="text-red-400">${esc(d.error)}</p></div>`;
        }
      } catch(e) {
        r.innerHTML = `<div class="stat-card border border-red-500/30"><p class="text-red-400">${esc(e.message)}</p></div>`;
        toast(e.message, 'error');
      }
    }

    function dlTemplate() {
      const c = '\uFEFF' + 'question_text,question_type,choice_a,choice_b,choice_c,choice_d,correct_answer,explanation,difficulty,points,image_url\n"ตัวอย่างคำถาม multiple_choice",multiple_choice,"ก","ข","ค","ง",A,"คำอธิบาย",easy,1,\n"คำถาม fill_blank เติมคำ",fill_blank,,,,,"คำตอบ","คำอธิบาย",easy,1,\n"ข้อความนี้ถูกต้องหรือไม่",true_false,,,,,true,"คำอธิบาย",easy,1,\n';
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([c], { type: 'text/csv;charset=utf-8;' }));
      a.download = 'quiz_template.csv';
      a.click();
    }

    async function togglePub(id, cur) {
      await sb.from('quiz_sets').update({ is_published: !cur }).eq('id', id);
      toast(`${!cur ? 'เผยแพร่' : 'ซ่อน'}แล้ว`, 'success'); admQuizSets();
    }
    async function changeRole(uid, role) {
      await sb.from('quiz_users').update({ role }).eq('userId', uid);
      toast('อัปเดตสำเร็จ', 'success');
    }
    function exportReport(qid) { window.open(`${API_BASE}/export-report?quiz_set_id=${qid}`, '_blank'); }
    function exportAll() { window.open(`${API_BASE}/export-report`, '_blank'); }

    // ══════════════════════════════════════════════════════════════
    // START
    // ══════════════════════════════════════════════════════════════
    init();
  </script>
</body>

</html>
